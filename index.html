    const ToastContext = React.createContext();
    const useToast = () => React.useContext(ToastContext);
    
    const ToastProvider = ({ children }) => {
        const [toasts, setToasts] = useState([]);
        const addToast = useCallback((msg, type = 'success') => {
            const id = Date.now() + Math.random();
            setToasts(prev => {
                if(prev.some(t => t.msg === msg)) return prev; 
                return [...prev, { id, msg, type }];
            });
            setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
        }, []);
        
        const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

        return (
            <ToastContext.Provider value={{ addToast }}>
                {children}
                <div className="fixed top-4 md:top-6 left-1/2 -translate-x-1/2 z-[11000] flex flex-col gap-2 items-center pointer-events-none w-[90%] sm:w-auto">
                    {toasts.map(t => {
                        let colors = ''; let icon = '';
                        if(t.type==='success') { colors='bg-emerald-500/95 border-emerald-400 text-white'; icon='🟢'; }
                        else if(t.type==='error') { colors='bg-red-500/95 border-red-400 text-white'; icon='🔴'; }
                        else if(t.type==='warning') { colors='bg-orange-500/95 border-orange-400 text-white'; icon='🟠'; }
                        else if(t.type==='info' || t.type==='process') { colors='bg-blue-500/95 border-blue-400 text-white'; icon='🔵'; }
                        
                        return (
                        <div key={t.id} className={`pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-full shadow-2xl backdrop-blur-xl border ${colors} animate-slide-down transform transition-all`}>
                            <span className={`text-sm shrink-0 drop-shadow-md ${t.type==='process' ? 'animate-spin' : ''}`}>{t.type==='process' ? '⏳' : icon}</span>
                            <span className="text-xs sm:text-sm font-bold leading-tight drop-shadow-md truncate max-w-[250px] sm:max-w-[400px]">{t.msg}</span>
                            <button onClick={()=>removeToast(t.id)} className="ml-2 opacity-70 hover:opacity-100 transition shrink-0"><IconX className="w-4 h-4"/></button>
                        </div>
                    )})}
                </div>
            </ToastContext.Provider>
        );
    };

        const handleKey = useCallback((num) => {
            setPinInput(prev => {

        const handleDelete = useCallback(() => {
            setPinInput(prev => prev.slice(0, -1));

                if (!isOpen || step === 4) return;
                if (/^[0-9]$/.test(e.key)) { handleKey(e.key); }

            window.addEventListener('keydown', handler);
            return () => window.removeEventListener('keydown', handler);

        useEffect(() => {
            if (pinInput.length === 6) {
                if (step === 1) {
                    if (window.btoa(pinInput) === oldPinHash) { setStep(2); setPinInput(''); }

                } else if (step === 2) {
                    setNewPinCache(pinInput); setStep(3); setPinInput('');

    const BannerSlider = ({ items }) => {
       const [curr, setCurr] = useState(0);
       const [isPaused, setIsPaused] = useState(false);
       const [isMuted, setIsMuted] = useState(true);
       const [expanded, setExpanded] = useState(false);
       const playerRef = useRef(null);
       const videoRef = useRef(null);

       useEffect(() => {
          if((items||[]).length <= 1 || isPaused) return;
          const t = setInterval(() => { setCurr(c => (c+1)%(items||[]).length); setExpanded(false); }, 6000);
          return () => clearInterval(t);
       }, [(items||[]).length, isPaused]);

       useEffect(() => {
           if(videoRef.current) { videoRef.current.muted = isMuted; }
       }, [isMuted, curr]);

       useEffect(() => {
           if (!items || items.length === 0) return;
           const currentItem = items[curr];
           if(currentItem?.type === 'youtube') {
               setIsPaused(true);
               if(window.YT && window.YT.Player) {
                   try {
                       if(playerRef.current && typeof playerRef.current.destroy === 'function') playerRef.current.destroy();
                       playerRef.current = new window.YT.Player(`yt-player-${curr}`, {
                           videoId: getYouTubeId(currentItem.url),
                           playerVars: { autoplay: 1, controls: 0, mute: isMuted ? 1 : 0, rel: 0, showinfo: 0, loop: 1, playlist: getYouTubeId(currentItem.url) },
                           events: { onReady: (e) => { if(!isMuted) e.target.unMute(); }, onStateChange: (e) => { if (e.data === window.YT.PlayerState.ENDED) { setCurr(c => (c+1)%items.length); setIsPaused(false); } } }
                       });
                   } catch(e) { setIsPaused(false); }
               } else { setTimeout(()=> { setCurr(c => (c+1)%items.length); setIsPaused(false); }, 10000); }
           } else if (currentItem?.type === 'video' || ((currentItem?.url||'').match(/\.(mp4|webm)$/i))) {
               setIsPaused(true);
               if(playerRef.current && typeof playerRef.current.destroy === 'function') { playerRef.current.destroy(); playerRef.current = null; }
               if(videoRef.current) { videoRef.current.muted = isMuted; videoRef.current.play().catch(e => {}); videoRef.current.onended = () => { setCurr(c => (c+1)%items.length); setIsPaused(false); }; }
           } else {
               setIsPaused(false);
               if(playerRef.current && typeof playerRef.current.destroy === 'function') { playerRef.current.destroy(); playerRef.current = null; }
           }
       }, [curr, items]);

       if (!items || items.length === 0) return null;

       const toggleMute = (e) => {
           e.stopPropagation();
           const newMuted = !isMuted;
           setIsMuted(newMuted);
           if (items[curr]?.type === 'youtube' && playerRef.current) {
               if (newMuted) playerRef.current.mute(); else playerRef.current.unMute();
           }
       };

       const handleBannerClick = () => {
           const currentItem = items[curr];
           if (currentItem?.targetLink) { window.open(currentItem.targetLink, '_blank'); } 
           else { setExpanded(!expanded); }
       };

       return (
          <div className="w-full h-56 md:h-80 rounded-[2.5rem] overflow-hidden mb-10 relative border border-theme shadow-2xl bg-black mt-6 group z-10 cursor-pointer" onClick={handleBannerClick}>
             {items.map((b, i) => (
                <div key={i} className={`absolute inset-0 transition-opacity duration-1000 ${i === curr ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                    {b.type === 'youtube' ? ( <div id={`yt-player-${i}`} className="w-full h-full object-cover pointer-events-none opacity-80 scale-105"></div> ) : 
                     (b.type === 'video' || ((b.url||'').match(/\.(mp4|webm)$/i))) ? ( <video ref={i === curr ? videoRef : null} src={b.url} className="w-full h-full object-cover opacity-80" playsInline loop autoPlay={i===curr} /> ) : 
                     ( <img src={b.url} className="w-full h-full object-cover opacity-80 transition duration-[6000ms] ease-in-out transform scale-100 group-hover:scale-105" /> )}
                    
                   {(b.title || b.desc) && (
                      <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-6 md:p-8 z-20 pointer-events-none">
                         {b.title && <h3 className={`text-xl md:text-3xl font-black text-white drop-shadow-lg transition-all duration-500 ${expanded ? '-translate-y-2' : 'translate-y-4'}`}>{b.title}</h3>}
                         {b.desc && <div className={`overflow-hidden transition-all duration-500 ${expanded ? 'max-h-40 opacity-100 mt-2' : 'max-h-0 opacity-0'}`}><p className="text-xs md:text-sm text-gray-300 drop-shadow-md">{b.desc}</p></div>}
                         {!expanded && !b.targetLink && <div className="text-[9px] text-white/50 animate-pulse mt-4 flex items-center gap-1"><IconChevronUp className="w-3 h-3"/> Klik untuk info lengkap</div>}
                         {b.targetLink && <div className="text-[9px] text-orange-400 font-bold uppercase tracking-widest mt-4 flex items-center gap-1"><IconTag className="w-3 h-3"/> Kunjungi Tautan</div>}
                      </div>
                   )}
                </div>
             ))}

             {(items[curr]?.type === 'youtube' || items[curr]?.type === 'video' || ((items[curr]?.url||'').match(/\.(mp4|webm)$/i))) && (
                <button onClick={toggleMute} className="absolute top-4 right-4 z-30 p-2 bg-black/50 hover:bg-black/80 rounded-full text-white backdrop-blur-md transition border border-white/10 shadow-lg">
                    {isMuted ? <IconVolumeX className="w-4 h-4"/> : <IconVolume2 className="w-4 h-4"/>}
                </button>
             )}

             {items.length > 1 && (
                <div className="absolute bottom-6 right-6 flex gap-2 z-30">
                   {items.map((_, i) => (
                      <div key={i} onClick={(e)=>{e.stopPropagation(); setCurr(i); setExpanded(false);}} className={`h-2 rounded-full transition-all cursor-pointer ${i === curr ? 'w-8 bg-orange-500 shadow-[0_0_10px_orange]' : 'w-2 bg-white/50 hover:bg-white'}`}></div>
                   ))}
                </div>
             )}
          </div>
       );

      const getReceiptBytes = (order) => {
          let text = "";
          text += '\x1B' + '@'; // Init
          text += '\x1B' + 'a' + '\x01'; // Center
          
          if (order.paymentMethod.toLowerCase().includes('cash')) {
              text += '\x1B' + 'E' + '\x01'; // Bold
              text += 'VIPERCELL\n';
              text += '\x1B' + 'E' + '\x00';
              text += '--------------------------------\n';
              text += `TRX     : ${order.id}\n`;
              text += `TANGGAL : ${order.createdAt ? new Date(order.createdAt).toLocaleDateString('id-ID') : '-'}\n`;
              text += '--------------------------------\n';
              text += 'Pembayaran Cash\n';
              text += 'Terima kasih\n';
          } else {
              text += '\x1B' + 'E' + '\x01'; // Bold
              text += 'VIPERCELL STORE\n';
              text += '\x1B' + 'E' + '\x00'; // Bold off
              text += '--------------------------------\n';
              text += '\x1B' + 'a' + '\x00'; // Left
              text += `TRX    : ${order.id}\n`;
              text += `STATUS : ${order.status.toUpperCase()}\n`;
              text += '--------------------------------\n';
              text += `GAME   : ${order.gameName}\n`;
              text += `ID     : ${order.targetUserId} ${order.targetZoneId ? `(${order.targetZoneId})` : ''}\n`;
              if(order.targetNickname) text += `NICK   : ${order.targetNickname}\n`;
              text += `ITEM   : ${order.nominalName}\n`;
              text += `METODE : ${order.paymentMethod}\n`;
              text += '--------------------------------\n';
              text += '\x1B' + 'E' + '\x01';
              text += `TOTAL  : ${formatRupiah(order.priceTotal)}\n`;
              text += '\x1B' + 'E' + '\x00';
              text += `TANGGAL: ${order.createdAt ? new Date(order.createdAt).toLocaleDateString('id-ID') : '-'}\n`;
              text += '--------------------------------\n';
              text += '\x1B' + 'a' + '\x01'; // Center
              text += 'Terima kasih\n';
          }
          text += '\n\n\n'; // Feed lines
          return new TextEncoder().encode(text);
      };

      const connectBluetoothPrinter = async () => {
          try {
              triggerSysLoad('Mencari Printer Bluetooth...');
              const device = await navigator.bluetooth.requestDevice({
                  filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                  optionalServices: ['0000e7810-0000-1000-8000-00805f9b34fb']
              }).catch(err => {
                  return navigator.bluetooth.requestDevice({
                      acceptAllDevices: true,
                      optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2']
                  });
              });

              setBluetoothDevice(device);
              const server = await device.gatt.connect();
              
              const services = await server.getPrimaryServices();
              let targetCharacteristic = null;

              for (const service of services) {
                  const characteristics = await service.getCharacteristics();
                  for (const char of characteristics) {
                      if (char.properties.write || char.properties.writeWithoutResponse) {
                          targetCharacteristic = char;
                          break;
                      }
                  }
                  if(targetCharacteristic) break;
              }

              if (targetCharacteristic) {
                  setBtCharacteristic(targetCharacteristic);
                  addToast('Printer Bluetooth berhasil terhubung!', 'success');
              } else {
                  throw new Error("Karakteristik Write tidak ditemukan di perangkat ini.");
              }
          } catch (e) {
              if (e.name === 'NotFoundError') { addToast('Batal mencari printer.', 'warning'); }
              else { addToast('Gagal terhubung ke printer. Pastikan Bluetooth aktif.', 'error'); console.error(e); }
          } finally {
              closeSysLoad();
          }
      };

      const disconnectBluetoothPrinter = () => {

      const testBluetoothPrint = async () => {
          if (!btCharacteristic) return addToast('Printer belum terhubung!', 'warning');
          try {
              triggerSysLoad('Sedang mencetak test...');
              let text = '\x1B@\x1Ba\x01\x1BE\x01VIPERCELL STORE\n\x1BE\x00--------------------------------\nTEST PRINT BERHASIL\n\n\n';
              await btCharacteristic.writeValue(new TextEncoder().encode(text));
              addToast('Test print berhasil!', 'success');

      // V11.2.2 Native Bluetooth Print (No Fallback Popups)
      const executeBluetoothPrint = async (order) => {
          if (!order) return;
          if (!isPrinterConnected || !btCharacteristic) {
              addToast('Printer belum terhubung! Silakan hubungkan di Pengaturan.', 'warning');
              return;
          }
          triggerSysLoad('Sedang mencetak struk...');
          try {
              const bytes = getReceiptBytes(order);
              const CHUNK_SIZE = 256; 
              for (let i = 0; i < bytes.length; i += CHUNK_SIZE) {
                  await btCharacteristic.writeValue(bytes.slice(i, i + CHUNK_SIZE));
                  await new Promise(r => setTimeout(r, 50)); 
              }

                                                  <div className="flex items-center gap-2 mb-2">
                                                     {p.category === 'flash' && <span className="bg-red-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">⚡ Flash Sale</span>}
                                                     {p.category === 'code' && <span className="bg-purple-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">🔑 Kode Kupon</span>}
                                                     {p.category === 'item' && <span className="bg-orange-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">🎯 Diskon Spesifik</span>}
                                                     {p.category === 'game' && <span className="bg-blue-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">🎮 Promo Game</span>}
                                                     {p.category === 'day' && <span className="bg-emerald-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">📅 Event Harian</span>}
                                                     <div className="text-base font-black font-mono tracking-widest text-main truncate max-w-[150px]">{p.code || (p.id||'').split('_')[0]}</div>
                                                  </div>
                                                  
                                                  <div className="text-sm font-bold text-sub-theme">
                                                     {p.type === 'percentage' ? <span className="text-orange-600 dark:text-orange-400">Potongan {p.discount}% Off</span> : <span className="text-emerald-600 dark:text-emerald-400">Diskon Tunai {formatRupiah(p.discount)}</span>}
                                                  </div>
                                                  
                                                  <div className="flex flex-wrap gap-2 mt-3">
                                                     {p.minPurchase > 0 && <span className="text-[9px] bg-black/5 dark:bg-black/50 border border-theme px-2 py-1 rounded text-main font-mono">Min: {formatRupiah(p.minPurchase)}</span>}
                                                     {p.targetItems?.length > 0 && <span className="text-[9px] bg-black/5 dark:bg-black/50 border border-orange-500/30 px-2 py-1 rounded text-orange-600 dark:text-orange-400 font-bold truncate max-w-[150px]">Khusus: {(items||[]).find(i=>i.id===p.targetItems[0])?.name || 'Item Terpilih'}</span>}
                                                     {p.targetGame && <span className="text-[9px] bg-black/5 dark:bg-black/50 border border-blue-500/30 px-2 py-1 rounded text-blue-600 dark:text-blue-400 font-bold truncate max-w-[150px]">Semua Item: {(games||[]).find(g=>g.id===p.targetGame)?.name || 'Game Terpilih'}</span>}
                                                     {(p.maxUses || p.stock) && <span className={`text-[9px] bg-black/5 dark:bg-black/50 border px-2 py-1 rounded font-mono font-bold ${((p.usedBy||[]).length >= (p.maxUses || p.stock)) ? 'border-red-500/30 text-red-600 dark:text-red-500' : 'border-theme text-main'}`}>Terpakai: {(p.usedBy||[]).length||0} / {p.maxUses || p.stock}</span>}
                                                  </div>
                                               </div>
                                               
                                               <div className="flex gap-2 w-full sm:w-auto mt-3 sm:mt-0 shrink-0 z-10 relative">
                                                  <button onClick={() => togglePromoStatus(p.id, p.isActive)} className={`w-12 h-10 rounded-xl transition-all flex items-center justify-center border shadow-inner ${p.isActive ? 'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border-emerald-500/30 hover:bg-emerald-500 hover:text-white' : 'bg-gray-200 dark:bg-gray-800/50 text-gray-500 border-theme hover:bg-gray-300 dark:hover:bg-gray-600 hover:text-main'}`} title={p.isActive ? 'Nonaktifkan Promo' : 'Aktifkan Kembali'}>
                                                     {p.isActive ? <IconCheckCircle className="w-5 h-5"/> : <IconBlock className="w-5 h-5"/>}
                                                  </button>
                                                  <button onClick={() => handleDeletePromo(p.id)} className="w-12 h-10 bg-gray-100 dark:bg-black/50 border border-red-500/20 text-red-600 dark:text-red-400 rounded-xl hover:bg-red-600 hover:text-white transition flex items-center justify-center shadow-inner group-hover:border-red-500/50" title="Hapus Permanen">
                                                     <IconTrash className="w-4 h-4"/>
                                                  </button>
                                               </div>
                                            </div>
                                         ))}
                                         {(!promos || promos.length === 0) && (
                                            <div className="flex flex-col items-center justify-center py-24 text-sub-theme border border-dashed border-theme rounded-[2rem] bg-card">
                                               <IconPercent className="w-12 h-12 mb-4 opacity-30"/>
                                               <span className="font-bold text-sm">Database promo kosong. Terbitkan promo pertama Anda.</span>
                                            </div>
                                         )}
                                      </div>
                                   </div>
                               </div>
                           </div>
                        )}

                     </div>
                  </div>
               </div>
            )}

            </div>
          </main>
          
          {/* Main Footer */}
          {currentView !== 'chat' && <MainFooter socialLinks={socialLinks} />}
        </div>
      );
    }
    
    // Aplikasi Root Entry
    const App = () => {
        return (
           <ToastProvider>
               <AppCore />
           </ToastProvider>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
