    const generateDynamicQRIS = (baseQRIS, amount) => {
      let qris = baseQRIS.slice(0, -8);
      if (amount) {

        qris += `54${amtLen}${amtStr}`;

      qris += "6304";
      let crc = 0xFFFF;
      for (let i = 0; i < qris.length; i++) {
        crc ^= qris.charCodeAt(i) << 8;
        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
          else crc = (crc << 1) & 0xFFFF;
        }
      }
      return qris + crc.toString(16).toUpperCase().padStart(4, '0');

    const compressImage = async (file, maxWidth = 300) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image(); img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } } 
            else { if (h > maxWidth) { w *= maxWidth / h; h = maxWidth; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
        }; reader.onerror = reject;
      });
    };

         if(!selectedNominal) return { base: 0, fee: 0, autoCut: 0, codeCut: 0, cashbackCut: 0, final: 0, autoPromo: null, earnedCashback: 0 };
         
         let base = selectedNominal.price;
         let fee = selectedPayment?.fee || 0;
         let autoPromo = getBestAutoPromo(selectedNominal.id);
         let autoCut = autoPromo ? (autoPromo.type === 'percentage' ? (base * autoPromo.discount/100) : autoPromo.discount) : 0;
         
         let currentTotal = Math.max(0, base - autoCut);

         let codeCut = 0;
         if(activePromoCode) {
            codeCut = activePromoCode.type === 'percentage' ? (currentTotal * activePromoCode.discount/100) : activePromoCode.discount;
            currentTotal = Math.max(0, currentTotal - codeCut);
         }
         
         currentTotal += fee;

         let cashbackCut = 0;
         if(useCashback && (currentUserData?.cashbackBalance || 0) > 0) {
            cashbackCut = Math.min(currentTotal, currentUserData.cashbackBalance); // Can't deduct more than total
            currentTotal -= cashbackCut;
         }

         // Calculate future earn (Cashback earned based on final paid amount minus fee, based on VIP tier)
         const userTier = getVipTier(currentUserData?.totalSpent || 0);
         const earnedCashback = Math.floor((currentTotal - fee) * userTier.cbRate);

               maxUses: newPromoMaxUses ? Number(newPromoMaxUses) : 0, usedBy: [], isActive: true, createdAt: new Date().toISOString()

            if(promoTab === PROMO_CATEGORIES.CODE) { payload.code = newPromoCodeStr.toUpperCase(); payload.name = `Kupon ${newPromoCodeStr}`; }

            await setDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'promos', promoId), payload);

      const handleDeletePromo = (id) => requestDangerConfirm(`Hapus promo ini?`, async () => { try { await deleteDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'promos', id)); } catch(e){} });

         try {

      const handleGalleryUpload = async (e) => {

      const handleAddAdmin = async (e) => { e.preventDefault(); if (!newAdminEmail || !(newAdminEmail||'').includes('@') || (adminList||[]).includes(newAdminEmail)) return; await setDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'config', 'admins'), { emails: [...(adminList||[]), newAdminEmail] }, { merge: true }); setNewAdminEmail(''); };

                        )}

                        {activeAdminTab === 'katalog' && (
                           <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full overflow-y-auto custom-scrollbar pr-2">
                              <div className="space-y-4">
                                 <form onSubmit={handleSaveGame} className="bg-gray-50 dark:bg-white/5 p-4 rounded-2xl border border-gray-200 dark:border-white/10 space-y-3">
                                    <h3 className="font-black text-sm"><IconGamepad className="w-4 h-4 inline text-red-500 mb-1"/> {editingGameId?'Edit':'Tambah'} Game</h3>
                                    <input type="text" required value={newGameId} onChange={e=>setNewGameId(e.target.value)} disabled={editingGameId!==null} placeholder="ID (cth: mlbb)" className="w-full bg-white dark:bg-black p-2 rounded-lg text-xs border border-gray-200 dark:border-white/10 focus:border-red-500 outline-none disabled:opacity-50"/>
                                    <input type="text" required value={newGameName} onChange={e=>setNewGameName(e.target.value)} placeholder="Nama Game" className="w-full bg-white dark:bg-black p-2 rounded-lg text-xs border border-gray-200 dark:border-white/10 focus:border-red-500 outline-none"/>
                                    <select value={newGameInput} onChange={e=>setNewGameInput(e.target.value)} className="w-full bg-white dark:bg-black p-2 rounded-lg text-xs border border-gray-200 dark:border-white/10 focus:border-red-500 outline-none">
                                       <option value="id_zone">User ID + Zone ID</option><option value="id_only">User ID Saja</option><option value="riot_id">Riot ID</option>
                                    </select>
                                    <div className="relative bg-white dark:bg-black border border-dashed border-gray-300 p-2 rounded-lg text-center text-xs text-gray-500">
                                       <input type="file" onChange={async(e)=>{if(e.target.files[0]){setUploadingGameImg(true);try{setNewGameImg(await compressImage(e.target.files[0], 300))}catch(e){}setUploadingGameImg(false)}}} className="absolute inset-0 w-full h-full opacity-0"/>
                                       {uploadingGameImg?'Loading...':newGameImg?'Gambar OK (Klik ubah)':'Upload Cover Game'}
                                    </div>
                                    <button type="submit" className="w-full bg-red-600 text-white p-2.5 rounded-lg text-xs font-black uppercase">Simpan Game</button>
                                 </form>
                                 <div className="bg-gray-50 dark:bg-white/5 p-4 rounded-2xl border border-gray-200 dark:border-white/10 flex flex-col gap-2 max-h-[300px] overflow-y-auto">
                                    {games.map(g => (
                                       <div key={g.id} onClick={()=>setAdminSelectedGame(g.id)} className={`flex justify-between items-center p-2 rounded-lg border cursor-pointer ${adminSelectedGame===g.id?'bg-red-50 border-red-500 text-red-600 dark:bg-red-500/20 dark:text-red-400':'bg-white dark:bg-black border-transparent'}`}>
                                          <div className="flex gap-2 items-center text-xs font-bold"><img src={g.image} className="w-6 h-6 rounded object-cover"/>{g.name}</div>
                                          <div className="flex gap-1"><button onClick={(e)=>{e.stopPropagation();handleEditGameClick(g)}} className="text-gray-500"><IconEdit className="w-3.5 h-3.5"/></button><button onClick={(e)=>{e.stopPropagation();handleDeleteGame(g.id)}} className="text-red-500"><IconTrash className="w-3.5 h-3.5"/></button></div>
                                       </div>
                                    ))}
                                 </div>
                              </div>
                              <div className="space-y-4 flex flex-col h-full">
                                 <form onSubmit={handleSaveItem} className="bg-gray-50 dark:bg-white/5 p-4 rounded-2xl border border-gray-200 dark:border-white/10 space-y-3">
                                    <h3 className="font-black text-sm"><IconBox className="w-4 h-4 inline text-emerald-500 mb-1"/> Produk {games.find(g=>g.id===adminSelectedGame)?.name||''}</h3>
                                    <input type="text" required value={newItemName} onChange={e=>setNewItemName(e.target.value)} disabled={!adminSelectedGame} placeholder="Nama Nominal (cth: 86 Diamonds)" className="w-full bg-white dark:bg-black p-2 rounded-lg text-xs border focus:border-emerald-500 outline-none"/>
                                    <input type="number" required value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} disabled={!adminSelectedGame} placeholder="Harga Asli (Rp)" className="w-full bg-white dark:bg-black p-2 rounded-lg text-xs border focus:border-emerald-500 outline-none font-mono"/>
                                    <button type="submit" disabled={!adminSelectedGame} className="w-full bg-emerald-600 disabled:bg-gray-400 text-white p-2.5 rounded-lg text-xs font-black uppercase">Simpan Produk</button>
                                 </form>
                                 <div className="flex-1 bg-gray-50 dark:bg-white/5 p-4 rounded-2xl border border-gray-200 dark:border-white/10 grid grid-cols-1 sm:grid-cols-2 gap-2 overflow-y-auto content-start">
                                    {items.filter(i=>i.gameId===adminSelectedGame).map(i => (
                                       <div key={i.id} className="bg-white dark:bg-black p-3 rounded-xl border border-gray-200 dark:border-white/10 flex justify-between items-center text-xs">
                                          <div><div className="font-bold text-gray-900 dark:text-white">{i.name}</div><div className="text-emerald-600 font-mono font-black">{formatRupiah(i.price)}</div></div>
                                          <div className="flex gap-1"><button onClick={()=>handleEditItemClick(adminSelectedGame,i)} className="bg-gray-100 dark:bg-white/10 p-1.5 rounded"><IconEdit className="w-3.5 h-3.5"/></button><button onClick={()=>handleDeleteItem(i.id)} className="bg-red-50 text-red-500 p-1.5 rounded"><IconTrash className="w-3.5 h-3.5"/></button></div>
                                       </div>
                                    ))}
                                 </div>
                              </div>
                           </div>
                        )}

                        {activeAdminTab === 'promo' && (
                           <div className="flex flex-col h-full pb-10">
                              <h2 className="text-2xl font-black mb-4">Ultimate Promo Center v5.1</h2>
                              <div className="flex gap-2 mb-4 bg-gray-100 dark:bg-white/5 p-1 rounded-xl w-max border border-gray-200 dark:border-white/10">
                                 {[{id:'item',n:'Promo Item'},{id:'flash',n:'Flash Sale'},{id:'day',n:'Promo Hari'},{id:'code',n:'Kupon Rahasia'}].map(t => (
                                    <button key={t.id} onClick={()=>setPromoTab(t.id)} className={`px-4 py-2 text-xs font-bold rounded-lg transition ${promoTab===t.id?'bg-white dark:bg-black shadow-sm text-purple-600':'text-gray-500 hover:text-gray-900 dark:hover:text-white'}`}>{t.n}</button>
                                 ))}
                              </div>

                              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                                 {/* FORM ADD PROMO DYNAMIC */}
                                 <form onSubmit={handleAddPromoAdmin} className="bg-gradient-to-br from-purple-600 to-indigo-800 p-6 rounded-[2rem] text-white shadow-lg space-y-4 h-max">
                                    <h3 className="font-black border-b border-white/20 pb-2 mb-2">Buat {promoTab === 'item' ? 'Diskon Spesifik' : promoTab === 'flash' ? 'Flash Sale' : promoTab === 'day' ? 'Diskon Rutin Mingguan' : 'Kupon Rahasia'}</h3>
                                    
                                    {promoTab === 'code' && <div className="space-y-1"><label className="text-[10px] font-bold">Kode Kupon</label><input type="text" required value={newPromoCodeStr} onChange={e=>setNewPromoCodeStr(e.target.value)} className="w-full bg-black/30 p-2 rounded-lg outline-none text-sm font-mono uppercase" placeholder="VIPERX"/></div>}
                                    {promoTab === 'day' && <div className="space-y-1"><label className="text-[10px] font-bold">Hari Aktif</label><select value={newPromoDay} onChange={e=>setNewPromoDay(e.target.value)} className="w-full bg-black/30 p-2 rounded-lg outline-none text-sm"><option value="0">Minggu</option><option value="1">Senin</option><option value="2">Selasa</option><option value="3">Rabu</option><option value="4">Kamis</option><option value="5">Jumat</option><option value="6">Sabtu</option></select></div>}
                                    {promoTab === 'flash' && <div className="space-y-1"><label className="text-[10px] font-bold">Batas Waktu Berakhir</label><input type="datetime-local" required value={newFlashEndTime} onChange={e=>setNewFlashEndTime(e.target.value)} className="w-full bg-black/30 p-2 rounded-lg outline-none text-sm"/></div>}
                                    {promoTab === 'item' && <div className="space-y-1"><label className="text-[10px] font-bold">Target Item (Pilih Produk)</label><select onChange={e=>setNewPromoTargetItems([...newPromoTargetItems, e.target.value])} className="w-full bg-black/30 p-2 rounded-lg outline-none text-xs"><option>-- Tambah Target Item --</option>{items.map(i=><option key={i.id} value={i.id}>{games.find(g=>g.id===i.gameId)?.name} - {i.name}</option>)}</select>
                                       <div className="flex flex-wrap gap-1 mt-2">{newPromoTargetItems.map((tid, idx)=><span key={idx} className="bg-white/20 text-[9px] px-2 py-1 rounded flex items-center gap-1">{items.find(i=>i.id===tid)?.name} <button type="button" onClick={()=>setNewPromoTargetItems(newPromoTargetItems.filter(v=>v!==tid))}><IconX className="w-3 h-3"/></button></span>)}</div>
                                    </div>}

                                    <div className="grid grid-cols-2 gap-3">
                                       <div className="space-y-1"><label className="text-[10px] font-bold">Tipe Potongan</label><select value={newPromoType} onChange={e=>setNewPromoType(e.target.value)} className="w-full bg-black/30 p-2 rounded-lg outline-none text-xs"><option value="percentage">Persen (%)</option><option value="fixed">Rupiah (Rp)</option></select></div>
                                       <div className="space-y-1"><label className="text-[10px] font-bold">Nilai Potongan</label><input type="number" required value={newPromoValue} onChange={e=>setNewPromoValue(e.target.value)} className="w-full bg-black/30 p-2 rounded-lg outline-none text-sm font-mono"/></div>
                                    </div>
                                    <div className="space-y-1"><label className="text-[10px] font-bold">Batas Kuota (0 = Tanpa Batas)</label><input type="number" value={newPromoMaxUses} onChange={e=>setNewPromoMaxUses(e.target.value)} className="w-full bg-black/30 p-2 rounded-lg outline-none text-sm font-mono" placeholder="100"/></div>
                                    
                                    <button type="submit" className="w-full bg-white text-purple-700 font-black py-3 rounded-xl mt-4 hover:bg-gray-100 transition shadow-lg text-xs uppercase tracking-widest">Terbitkan Promo</button>
                                 </form>

                                 {/* LIST PROMO */}
                                 <div className="lg:col-span-2 bg-gray-50 dark:bg-white/5 rounded-[2rem] p-4 border border-gray-200 dark:border-white/10 overflow-y-auto custom-scrollbar flex flex-col gap-3 content-start">
                                    {promos.filter(p=>p.category===promoTab).map(p => (
                                       <div key={p.id} className={`bg-white dark:bg-black p-4 rounded-2xl border flex justify-between items-center shadow-sm ${!p.isActive ? 'opacity-50 grayscale' : 'border-purple-200 dark:border-purple-500/30'}`}>
                                          <div>
                                             <div className="font-black text-sm text-gray-900 dark:text-white mb-1">{p.name} {p.code && <span className="font-mono bg-purple-100 text-purple-600 px-2 rounded ml-1">{p.code}</span>}</div>
                                             <div className="text-xs font-bold text-gray-500">{p.type==='percentage'?`${p.discount}%`:`Rp${p.discount}`} | Terpakai: {(p.usedBy||[]).length}/{p.maxUses||'∞'}</div>
                                             {p.category === 'flash' && <div className="text-[9px] text-red-500 font-bold mt-1">Berakhir: {new Date(p.validUntil).toLocaleString('id-ID')}</div>}
                                          </div>
                                          <div className="flex gap-2">
                                             <button onClick={()=>togglePromoStatus(p.id, p.isActive)} className="p-2 bg-gray-100 dark:bg-white/10 rounded-lg tooltip" title="Toggle Aktif">{p.isActive?<IconCheckCircle className="w-4 h-4 text-emerald-500"/>:<IconZapOff className="w-4 h-4 text-gray-500"/>}</button>
                                             <button onClick={()=>handleDeletePromo(p.id)} className="p-2 bg-red-50 text-red-500 rounded-lg"><IconTrash className="w-4 h-4"/></button>
                                          </div>
                                       </div>
                                    ))}
                                    {promos.filter(p=>p.category===promoTab).length === 0 && <p className="text-center text-xs font-bold text-gray-500 mt-10">Belum ada promo kategori ini.</p>}
                                 </div>
                              </div>
                           </div>
                        )}

                        {activeAdminTab === 'members' && (
                           <div className="flex flex-col h-full">
                              <h2 className="text-xl font-black mb-4">Daftar Pelanggan & VIP Tier</h2>
                              <input type="text" placeholder="Cari email/nama..." value={adminMemberSearch} onChange={(e)=>setAdminMemberSearch(e.target.value)} className="bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none mb-4"/>
                              <div className="flex-1 overflow-auto bg-gray-50 dark:bg-white/5 rounded-2xl border border-gray-200 dark:border-white/10 custom-scrollbar">
                                 <table className="w-full text-left text-xs whitespace-nowrap min-w-[700px]">
                                    <thead className="bg-gray-200 dark:bg-white/10 font-black text-gray-600 dark:text-gray-300">
                                       <tr><th className="p-3">User</th><th className="p-3">Kontak</th><th className="p-3">VIP Tier</th><th className="p-3">Total Belanja</th><th className="p-3">Aksi</th></tr>
                                    </thead>
                                    <tbody>
                                       {memberList.filter(m => ((m.name || '').toLowerCase().includes(adminMemberSearch.toLowerCase()) || (m.email || '').toLowerCase().includes(adminMemberSearch.toLowerCase()))).map(m => {
                                          const tier = getVipTier(m.totalSpent);
                                          return (
                                          <tr key={m.id} className="border-b border-gray-200 dark:border-white/5">
                                             <td className="p-3"><div className="font-bold">{m.name}</div><div className="text-[10px] font-mono text-gray-500">{m.email}</div></td>
                                             <td className="p-3">{m.phone || '-'}</td>
                                             <td className="p-3"><span className={`px-2 py-1 rounded-full text-[9px] font-black text-white shadow-sm ${tier.color}`}>{tier.badge} {tier.name}</span></td>
                                             <td className="p-3 font-mono font-bold text-emerald-600">{formatRupiah(m.totalSpent)}</td>
                                             <td className="p-3 flex gap-1">
                                                <button onClick={()=>setWaModalMember(m)} className="bg-green-50 text-green-500 p-2 rounded tooltip" title="WA"><IconWhatsapp className="w-4 h-4"/></button>
                                                <button onClick={()=>handleDeleteMember(m.id)} className="bg-red-50 text-red-500 p-2 rounded"><IconTrash className="w-4 h-4"/></button>
                                             </td>
                                          </tr>
                                       )})}
                                    </tbody>
                                 </table>
                              </div>
                           </div>
                        )}

                        {activeAdminTab === 'support' && (
                           <div className="flex gap-4 h-full">
                              {/* Ticket List */}
                              <div className={`w-full md:w-1/3 bg-gray-50 dark:bg-white/5 rounded-2xl border border-gray-200 dark:border-white/10 flex-col overflow-hidden ${activeChatEmail ? 'hidden md:flex' : 'flex'}`}>
                                 <div className="p-4 border-b flex justify-between bg-white dark:bg-black/50">
                                    <h3 className="font-black text-sm">Tiket Masuk</h3>
                                    <button onClick={()=>setBroadcastModal({isOpen:true, text:''})} className="text-blue-500"><IconSend className="w-4 h-4"/></button>
                                 </div>
                                 <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                    {activeSupportChats.map(c => (
                                       <div key={c.id} onClick={()=>setActiveChatEmail(c.id)} className={`p-3 rounded-xl cursor-pointer border text-xs ${activeChatEmail===c.id?'bg-orange-50 border-orange-200 dark:bg-orange-500/10':'bg-white dark:bg-transparent border-transparent hover:bg-gray-100 dark:hover:bg-white/5'}`}>
                                          <div className="flex justify-between font-bold mb-1">
                                             <span className="truncate w-3/4">{c.userName}</span>
                                             {c.status==='Open'?<span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>:<span className="text-[8px] bg-emerald-100 text-emerald-600 px-1 rounded">Selesai</span>}
                                          </div>
                                          <div className="text-gray-500 truncate">{c.messages?.[c.messages.length-1]?.text}</div>
                                       </div>
                                    ))}
                                 </div>
                              </div>
                              {/* Chat Room */}
                              <div className={`flex-1 bg-white dark:bg-black rounded-2xl border border-gray-200 dark:border-white/10 flex-col overflow-hidden ${!activeChatEmail ? 'hidden md:flex' : 'flex'}`}>
                                 {activeChatEmail ? (
                                    <>
                                       <div className="p-4 border-b bg-gray-50 dark:bg-white/5 flex justify-between items-center shrink-0">
                                          <div className="flex items-center gap-2">
                                             <button onClick={()=>setActiveChatEmail(null)} className="md:hidden mr-2"><IconChevronLeft className="w-5 h-5"/></button>
                                             <div className="font-black text-sm">{activeSupportChats.find(c=>c.id===activeChatEmail)?.userName}</div>
                                          </div>
                                          <button onClick={markChatDone} className="bg-emerald-100 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-bold">Tutup Tiket</button>
                                       </div>
                                       <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
                                          {activeSupportChats.find(c=>c.id===activeChatEmail)?.messages?.map((msg, i) => (
                                             <div key={i} className={`flex w-full ${msg.sender === 'admin' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[80%] p-3 rounded-xl text-sm shadow-sm ${msg.sender === 'admin' ? 'bg-orange-500 text-white rounded-tr-sm' : 'bg-gray-100 dark:bg-white/10 rounded-tl-sm'}`}>
                                                   {renderChatMessage(msg.text)}
                                                   <div className="text-[8px] mt-1 opacity-70 text-right">{new Date(msg.time).toLocaleTimeString('id-ID')}</div>
                                                </div>
                                             </div>
                                          ))}
                                          <div ref={adminChatEndRef} />
                                       </div>
                                       <form onSubmit={handleAdminSendChat} className="p-3 bg-gray-50 dark:bg-white/5 border-t flex gap-2 shrink-0">
                                          <input type="text" value={adminReplyText} onChange={e=>setAdminReplyText(e.target.value)} placeholder="Balas pesan..." className="flex-1 rounded-xl px-4 py-2 border focus:border-orange-500 outline-none text-sm dark:bg-black dark:border-white/10" />
                                          <button type="submit" disabled={!adminReplyText.trim()} className="bg-orange-500 text-white px-4 rounded-xl disabled:opacity-50"><IconSend className="w-4 h-4"/></button>
                                       </form>
                                    </>
                                 ) : <div className="m-auto text-gray-400 font-bold text-sm">Pilih chat untuk memulai.</div>}
                              </div>
                           </div>
                        )}

                        {activeAdminTab === 'settings' && (
                           <div className="space-y-6 max-w-4xl">
                              <h2 className="text-xl font-black mb-4">Pengaturan Website</h2>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                 <div className="bg-gray-50 dark:bg-white/5 p-6 rounded-[2rem] border shadow-sm">
                                    <h3 className="font-black text-sm mb-4"><IconSettings className="w-4 h-4 inline mr-2 text-gray-500"/> Status Website</h3>
                                    <button onClick={toggleStore} className={`w-full py-4 rounded-xl font-black text-xs uppercase shadow-md ${isStoreOpen ? 'bg-emerald-100 text-emerald-600 border border-emerald-300' : 'bg-red-500 text-white'}`}>{isStoreOpen ? 'Sistem Live (Online)' : 'Maintenance (Offline)'}</button>
                                 </div>
                                 <div className="bg-gray-50 dark:bg-white/5 p-6 rounded-[2rem] border shadow-sm">
                                    <h3 className="font-black text-sm mb-4"><IconUsers className="w-4 h-4 inline mr-2 text-blue-500"/> Kontak Sosial</h3>
                                    <div className="space-y-2">
                                       <input type="text" value={adminIG} onChange={e=>setAdminIG(e.target.value)} placeholder="Link Instagram" className="w-full text-xs p-3 rounded-xl border dark:bg-black dark:border-white/10 focus:outline-none"/>
                                       <input type="text" value={adminWA} onChange={e=>setAdminWA(e.target.value)} placeholder="Link WhatsApp" className="w-full text-xs p-3 rounded-xl border dark:bg-black dark:border-white/10 focus:outline-none"/>
                                       <button onClick={saveSettingsLinks} className="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs">Simpan Kontak</button>
                                    </div>
                                 </div>
                                 <div className="bg-gray-50 dark:bg-white/5 p-6 rounded-[2rem] border shadow-sm md:col-span-2">
                                    <h3 className="font-black text-sm mb-4"><IconTag className="w-4 h-4 inline mr-2 text-orange-500"/> Banner & Teks Berjalan</h3>
                                    
                                    <label className="text-[10px] font-bold text-gray-500 mb-1 block">Pengumuman Papan Berita (Tampil di bawah banner)</label>
                                    <input type="text" value={adminAnnounceInput} onChange={e=>setAdminAnnounceInput(e.target.value)} placeholder="Info gangguan server atau promo kilat..." className="w-full text-xs p-3 rounded-xl border dark:bg-black dark:border-white/10 focus:outline-none mb-4"/>

                                    <label className="text-[10px] font-bold text-gray-500 mb-1 block">Teks Berjalan (Marquee Header)</label>
                                    <div className="space-y-2 mb-4">
                                       {[0,1,2].map(idx => (
                                          <input key={idx} type="text" value={runningTexts[idx]||''} onChange={e=>handleRunningTextChange(idx, e.target.value)} placeholder={`Baris Info ${idx+1}`} className="w-full text-xs p-3 rounded-xl border dark:bg-black dark:border-white/10 focus:outline-none"/>
                                       ))}
                                    </div>
                                    <button onClick={saveSettingsGlobals} className="w-full bg-orange-600 text-white py-3 rounded-xl font-black text-xs mb-6">Simpan Konfigurasi</button>

                                    <label className="text-[10px] font-bold text-gray-500 mb-1 block mt-4">Slider Gambar Utama (Max 2MB)</label>
                                    <div className="relative h-12 border-2 border-dashed border-gray-300 dark:border-white/20 rounded-xl flex items-center justify-center text-xs font-bold text-gray-500 cursor-pointer mb-2">
                                       <input type="file" accept="image/*" onChange={handleBannerUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
                                       <IconUpload className="w-4 h-4 mr-2"/> Upload Banner Baru
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-2">
                                       {banners.map((b,i) => (
                                          <div key={i} className="relative w-24 h-16 shrink-0 rounded-lg overflow-hidden border group"><img src={b.url} className="w-full h-full object-cover opacity-80"/><button onClick={()=>handleDeleteBanner(i)} className="absolute inset-0 bg-red-500/80 text-white flex items-center justify-center opacity-0 group-hover:opacity-100"><IconTrash className="w-4 h-4"/></button></div>
                                       ))}
                                    </div>
                                 </div>
                              </div>
                           </div>
                        )}

                     </div>
                  </div>
               </div>
            )}
            
            </div>
          </main>
          
          {currentView !== 'chat' && <MainFooter socialLinks={socialLinks} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
