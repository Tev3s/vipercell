          img.onload = () => {
            const canvas = document.createElement('canvas'); let w = img.width, h = img.height;

    const ToastContext = React.createContext();

    const ToastProvider = ({ children }) => {
        const [toasts, setToasts] = useState([]);
        const addToast = useCallback((msg, type = 'success') => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type }]);
            setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
        }, []);
        
        const removeToast = (id) => {
            setToasts(prev => prev.filter(t => t.id !== id));
        }

        return (
            <ToastContext.Provider value={{ addToast }}>
                {children}
                <div className="fixed top-4 md:top-6 left-1/2 -translate-x-1/2 z-[10000] flex flex-col gap-2 items-center pointer-events-none w-[90%] sm:w-auto">
                    {toasts.map(t => {
                        let colors = ''; let icon = '';
                        if(t.type==='success') { colors='bg-emerald-500/90 border-emerald-400 text-white'; icon='🟢'; }
                        else if(t.type==='error') { colors='bg-red-500/90 border-red-400 text-white'; icon='🔴'; }
                        else if(t.type==='warning') { colors='bg-orange-500/90 border-orange-400 text-white'; icon='🟠'; }
                        else if(t.type==='info' || t.type==='process') { colors='bg-blue-500/90 border-blue-400 text-white'; icon='🔵'; }
                        
                        return (
                        <div key={t.id} className={`pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-full shadow-2xl backdrop-blur-xl border ${colors} animate-in slide-in-from-top-8 zoom-in-95 fade-in duration-300 transform transition-all`}>
                            <span className={`text-sm shrink-0 drop-shadow-md ${t.type==='process' ? 'animate-spin' : ''}`}>{t.type==='process' ? '⏳' : icon}</span>
                            <span className="text-xs sm:text-sm font-bold leading-tight drop-shadow-md truncate max-w-[250px] sm:max-w-[400px]">{t.msg}</span>
                            <button onClick={()=>removeToast(t.id)} className="ml-2 opacity-70 hover:opacity-100 transition shrink-0"><IconX className="w-4 h-4"/></button>
                        </div>
                    )})}
                </div>

    const BannerSlider = ({ items }) => {
       const [curr, setCurr] = useState(0);
       const [isPaused, setIsPaused] = useState(false);
       const [isMuted, setIsMuted] = useState(true);
       const [expanded, setExpanded] = useState(false);
       const playerRef = useRef(null);
       const videoRef = useRef(null);

       useEffect(() => {
          if((items||[]).length <= 1 || isPaused) return;
          const t = setInterval(() => { setCurr(c => (c+1)%(items||[]).length); setExpanded(false); }, 6000);
          return () => clearInterval(t);
       }, [(items||[]).length, isPaused]);

       useEffect(() => {
           if(videoRef.current) { videoRef.current.muted = isMuted; }
       }, [isMuted, curr]);

       useEffect(() => {
           if (!items || items.length === 0) return;
           const currentItem = items[curr];
           if(currentItem?.type === 'youtube') {
               setIsPaused(true);
               if(window.YT && window.YT.Player) {
                   try {
                       if(playerRef.current && typeof playerRef.current.destroy === 'function') playerRef.current.destroy();
                       playerRef.current = new window.YT.Player(`yt-player-${curr}`, {
                           videoId: getYouTubeId(currentItem.url),
                           playerVars: { autoplay: 1, controls: 0, mute: isMuted ? 1 : 0, rel: 0, showinfo: 0, loop: 1, playlist: getYouTubeId(currentItem.url) },
                           events: { onReady: (e) => { if(!isMuted) e.target.unMute(); }, onStateChange: (e) => { if (e.data === window.YT.PlayerState.ENDED) { setCurr(c => (c+1)%items.length); setIsPaused(false); } } }
                       });
                   } catch(e) { setIsPaused(false); }
               } else { setTimeout(()=> { setCurr(c => (c+1)%items.length); setIsPaused(false); }, 10000); }
           } else if (currentItem?.type === 'video' || ((currentItem?.url||'').match(/\.(mp4|webm)$/i))) {
               setIsPaused(true);
               if(playerRef.current && typeof playerRef.current.destroy === 'function') { playerRef.current.destroy(); playerRef.current = null; }
               if(videoRef.current) { videoRef.current.muted = isMuted; videoRef.current.play().catch(e => {}); videoRef.current.onended = () => { setCurr(c => (c+1)%items.length); setIsPaused(false); }; }
           } else {
               setIsPaused(false);
               if(playerRef.current && typeof playerRef.current.destroy === 'function') { playerRef.current.destroy(); playerRef.current = null; }
           }
       }, [curr, items]);

       if (!items || items.length === 0) return null;

       const toggleMute = (e) => {
           e.stopPropagation();
           const newMuted = !isMuted;
           setIsMuted(newMuted);
           if (items[curr]?.type === 'youtube' && playerRef.current) {
               if (newMuted) playerRef.current.mute(); else playerRef.current.unMute();
           }
       };

       return (
          <div className="w-full h-56 md:h-80 rounded-[2.5rem] overflow-hidden mb-10 relative border border-white/10 shadow-2xl bg-black mt-6 group z-10">
             {items.map((b, i) => (
                <div key={i} className={`absolute inset-0 transition-opacity duration-1000 cursor-pointer ${i === curr ? 'opacity-100 z-10' : 'opacity-0 z-0'}`} onClick={()=>setExpanded(!expanded)}>
                    {b.type === 'youtube' ? ( <div id={`yt-player-${i}`} className="w-full h-full object-cover pointer-events-none opacity-80 scale-105"></div> ) : 
                     (b.type === 'video' || ((b.url||'').match(/\.(mp4|webm)$/i))) ? ( <video ref={i === curr ? videoRef : null} src={b.url} className="w-full h-full object-cover opacity-80" playsInline loop autoPlay={i===curr} /> ) : 
                     ( <img src={b.url} className="w-full h-full object-cover opacity-80 transition duration-[6000ms] ease-in-out transform scale-100 group-hover:scale-105" /> )}
                   
                   {(b.title || b.desc) && (
                      <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-6 md:p-8 z-20 pointer-events-none">
                         {b.title && <h3 className={`text-xl md:text-3xl font-black text-white drop-shadow-lg transition-all duration-500 ${expanded ? '-translate-y-2' : 'translate-y-4'}`}>{b.title}</h3>}
                         {b.desc && <div className={`overflow-hidden transition-all duration-500 ${expanded ? 'max-h-40 opacity-100 mt-2' : 'max-h-0 opacity-0'}`}><p className="text-xs md:text-sm text-gray-300 drop-shadow-md">{b.desc}</p></div>}
                         {!expanded && <div className="text-[9px] text-white/50 animate-pulse mt-4 flex items-center gap-1"><IconChevronUp className="w-3 h-3"/> Klik untuk info lengkap</div>}
                      </div>
                   )}
                </div>
             ))}

             {(items[curr]?.type === 'youtube' || items[curr]?.type === 'video' || ((items[curr]?.url||'').match(/\.(mp4|webm)$/i))) && (
                <button onClick={toggleMute} className="absolute top-4 right-4 z-30 p-2 bg-black/50 hover:bg-black/80 rounded-full text-white backdrop-blur-md transition border border-white/10 shadow-lg">
                    {isMuted ? <IconVolumeX className="w-4 h-4"/> : <IconVolume2 className="w-4 h-4"/>}
                </button>
             )}

             {items.length > 1 && (
                <div className="absolute bottom-6 right-6 flex gap-2 z-30">
                   {items.map((_, i) => (
                      <div key={i} onClick={(e)=>{e.stopPropagation(); setCurr(i); setExpanded(false);}} className={`h-2 rounded-full transition-all cursor-pointer ${i === curr ? 'w-8 bg-orange-500 shadow-[0_0_10px_orange]' : 'w-2 bg-white/50 hover:bg-white'}`}></div>
                   ))}
                </div>
             )}
          </div>
       );
    };

                                        <input type="text" required value={newItemName} onChange={(e)=>setNewItemName(e.target.value)} placeholder="Contoh: 86 Diamonds" disabled={!adminSelectedGame} className="w-full bg-black p-3.5 rounded-xl text-white text-sm border border-emerald-500/30 focus:border-emerald-500 transition disabled:opacity-50"/>
                                    </div>
                                    <div className="flex-1 sm:max-w-[200px] space-y-1">
                                        <label className="text-[9px] text-emerald-500 font-black uppercase tracking-widest ml-1">Harga Jual (Rp)</label>
                                        <input type="number" required value={newItemPrice} onChange={(e)=>setNewItemPrice(e.target.value)} placeholder="25000" disabled={!adminSelectedGame} className="w-full bg-black p-3.5 rounded-xl text-white text-sm border border-emerald-500/30 focus:border-emerald-500 transition disabled:opacity-50 font-mono"/>
                                    </div>
                                    <div className="flex gap-2 items-end pt-4 sm:pt-0">
                                        <button type="submit" disabled={!adminSelectedGame} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition disabled:opacity-50 h-[46px]">{editingItemId ? 'Update Data' : 'Tambah Baru'}</button>
                                        {editingItemId && <button type="button" onClick={()=>{setEditingItemId(null); setNewItemName(''); setNewItemPrice('');}} className="bg-white/10 hover:bg-white/20 text-white px-4 py-3.5 rounded-xl transition h-[46px]"><IconX className="w-4 h-4"/></button>}
                                    </div>
                                 </form>
                                 
                                 <div className="flex-1 bg-black/40 rounded-3xl p-5 border border-white/5 overflow-y-auto custom-scrollbar shadow-inner">
                                    <h3 className="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-widest">Daftar Produk Aktif ({(items||[]).filter(i=>i.gameId===adminSelectedGame).length})</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                       {(items||[]).filter(i=>i.gameId===adminSelectedGame).sort((a,b)=>a.price-b.price).map(i => (
                                          <div key={i.id} className="bg-white/5 p-4 rounded-2xl flex flex-col justify-between border border-white/10 hover:border-emerald-500/50 transition group relative overflow-hidden shadow-sm">
                                             <div className="mb-4 relative z-10">
                                                 <div className="text-white font-bold text-sm leading-tight mb-1">{i.name}</div>
                                                 <div className="text-emerald-400 font-mono font-black text-sm">{formatRupiah(i.price)}</div>
                                             </div>
                                             <div className="flex justify-end gap-2 relative z-10 pt-2 border-t border-white/5 mt-auto">
                                                <button onClick={()=>handleEditItemClick(adminSelectedGame, i)} className="text-gray-400 hover:text-white p-2 bg-black/50 rounded-lg transition"><IconEdit className="w-3.5 h-3.5"/></button>
                                                <button onClick={()=>handleDeleteItem(i.id)} className="text-gray-400 hover:text-red-500 p-2 bg-black/50 rounded-lg transition"><IconTrash className="w-3.5 h-3.5"/></button>
                                             </div>
                                          </div>
                                       ))}
                                       {(!items || items.filter(i=>i.gameId===adminSelectedGame).length === 0) && (
                                          <div className="col-span-full flex flex-col items-center justify-center py-16 text-gray-600 border border-dashed border-white/10 rounded-[2rem] bg-black/50">
                                              <IconBox className="w-12 h-12 mb-3 opacity-30"/>
                                              <span className="font-bold text-sm">Belum ada produk untuk game ini.</span>
                                          </div>
                                       )}
                                    </div>
                                 </div>
                              </div>
                           </div>
                        )}

                        {/* TAB: PUSAT PROMOSI */}
                        {activeAdminTab === 'promo' && (
                           <div className="animate-in fade-in slide-in-from-right-8 duration-500 flex flex-col h-full w-full space-y-6">
                               <div className="flex flex-col sm:flex-row justify-between sm:items-end gap-4 mb-2">
                                   <div>
                                       <h2 className="text-2xl font-black text-white flex items-center gap-2"><IconPercent className="w-6 h-6 text-orange-500"/> Pusat Promosi & Event</h2>
                                       <p className="text-xs text-gray-400 font-medium mt-1">Kelola Diskon Otomatis, Promo Per Game, Flash Sale, Kupon, dan Event Harian.</p>
                                   </div>
                               </div>

                               <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full pb-6">
                                   
                                   {/* Form Buat Promo */}
                                   <div className="lg:col-span-5 flex flex-col h-full">
                                      <form onSubmit={handleSavePromo} className="w-full bg-black/60 p-6 md:p-8 rounded-[2.5rem] border border-white/5 shadow-inner h-fit">
                                         <h3 className="text-lg font-black text-white mb-6">Formulir Terbitkan Promo</h3>
                                         
                                         <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-6">
                                             <button type="button" onClick={()=>setPromoModalType('item')} className={`p-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest border transition ${promoModalType==='item' ? 'bg-orange-500/20 border-orange-500/50 text-orange-400' : 'bg-black border-white/10 text-gray-500'}`}>🎯 Diskon Item</button>
                                             <button type="button" onClick={()=>setPromoModalType('game')} className={`p-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest border transition ${promoModalType==='game' ? 'bg-blue-500/20 border-blue-500/50 text-blue-400' : 'bg-black border-white/10 text-gray-500'}`}>🎮 Promo Game</button>
                                             <button type="button" onClick={()=>setPromoModalType('flash')} className={`p-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest border transition ${promoModalType==='flash' ? 'bg-red-500/20 border-red-500/50 text-red-400' : 'bg-black border-white/10 text-gray-500'}`}>⚡ Flash Sale</button>
                                             <button type="button" onClick={()=>setPromoModalType('code')} className={`p-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest border transition ${promoModalType==='code' ? 'bg-purple-500/20 border-purple-500/50 text-purple-400' : 'bg-black border-white/10 text-gray-500'}`}>🔑 Kode Kupon</button>
                                             <button type="button" onClick={()=>setPromoModalType('day')} className={`p-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest border transition ${promoModalType==='day' ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : 'bg-black border-white/10 text-gray-500'}`}>📅 Hari Spesial</button>
                                         </div>
                                         
                                         <div className="space-y-4">
                                             <div className="flex gap-3">
                                                 <div className="flex-1 space-y-1">
                                                     <label className="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Jenis Potongan</label>
                                                     <select value={promoForm.type} onChange={(e)=>setPromoForm({...promoForm, type: e.target.value})} className="w-full bg-white/5 p-3.5 rounded-xl text-white text-sm border border-white/10 focus:border-orange-500 appearance-none">
                                                         <option value="percentage">Persen (%)</option>
                                                         <option value="fixed">Nominal Harga (Rp)</option>
                                                     </select>
                                                 </div>
                                                 <div className="flex-1 space-y-1">
                                                     <label className="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Besaran Nilai</label>
                                                     <input type="number" required value={promoForm.discount} onChange={(e)=>setPromoForm({...promoForm, discount: e.target.value})} placeholder="Contoh: 10" className="w-full bg-white/5 p-3.5 rounded-xl text-white text-sm border border-white/10 focus:border-orange-500 font-mono" />
                                                 </div>
                                             </div>

                                             {/* Conditional Inputs */}
                                             {(promoModalType==='flash' || promoModalType==='item') && (
                                                 <div className="space-y-1">
                                                     <label className="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Target Produk Spesifik</label>
                                                     <select value={promoTargetItem} onChange={(e)=>setPromoTargetItem(e.target.value)} required className="w-full bg-white/5 p-3.5 rounded-xl text-white text-sm border border-white/10 focus:border-orange-500 appearance-none">
                                                         <option value="">-- Pilih Item dari Katalog --</option>
                                                         {(items||[]).map(i=><option key={i.id} value={i.id}>{((games||[]).find(g=>g.id===i.gameId)?.name || 'Game')} - {i.name} ({formatRupiah(i.price)})</option>)}
                                                     </select>
                                                 </div>
                                             )}

                                             {promoModalType==='game' && (
                                                 <div className="space-y-1">
                                                     <label className="text-[9px] font-black text-blue-500 uppercase tracking-widest ml-1">Terapkan Diskon ke Semua Item Game Ini</label>
                                                     <select value={promoTargetGame} onChange={(e)=>setPromoTargetGame(e.target.value)} required className="w-full bg-white/5 p-3.5 rounded-xl text-white text-sm border border-blue-500/30 focus:border-blue-500 appearance-none">
                                                         <option value="">-- Pilih Game --</option>
                                                         {(games||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                                                     </select>
                                                 </div>
                                             )}

                                             {promoModalType==='flash' && (
                                                <div className="space-y-4 pt-2 border-t border-white/10">
                                                   <div className="grid grid-cols-2 gap-3">
                                                       <div className="space-y-1">
                                                           <label className="text-[9px] font-black text-red-400 uppercase tracking-widest ml-1">Mulai Berlaku</label>
                                                           <input type="datetime-local" required value={promoForm.startTime} onChange={(e)=>setPromoForm({...promoForm, startTime: e.target.value})} className="w-full bg-white/5 p-3 rounded-xl text-white text-xs border border-red-500/30 focus:border-red-500"/>
                                                       </div>
                                                       <div className="space-y-1">
                                                           <label className="text-[9px] font-black text-red-400 uppercase tracking-widest ml-1">Berakhir Pada</label>
                                                           <input type="datetime-local" required value={promoForm.endTime} onChange={(e)=>setPromoForm({...promoForm, endTime: e.target.value})} className="w-full bg-white/5 p-3 rounded-xl text-white text-xs border border-red-500/30 focus:border-red-500"/>
                                                       </div>
                                                   </div>
                                                   <div className="space-y-1">
                                                       <label className="text-[9px] font-black text-red-400 uppercase tracking-widest ml-1">Batas Kuota / Stok Promo</label>
                                                       <input type="number" required value={promoForm.stock} onChange={(e)=>setPromoForm({...promoForm, stock: e.target.value})} placeholder="Contoh: 50 pembeli pertama" className="w-full bg-white/5 p-3.5 rounded-xl text-white text-sm border border-red-500/30 focus:border-red-500 font-mono"/>
                                                   </div>
                                                </div>
                                             )}

                                             {promoModalType==='code' && (
                                                <div className="space-y-4 pt-2 border-t border-white/10">
                                                   <div className="space-y-1">
                                                       <label className="text-[9px] font-black text-purple-400 uppercase tracking-widest ml-1">Teks Kode Kupon Rahasia</label>
                                                       <input type="text" required value={promoForm.code} onChange={(e)=>setPromoForm({...promoForm, code: (e.target.value||'').replace(/\s/g, '').toUpperCase()})} placeholder="Ketik Kode (Misal: VIPERPROMO)" className="w-full bg-white/5 p-3.5 rounded-xl text-white text-sm border border-purple-500/30 focus:border-purple-500 font-mono uppercase font-black"/>
                                                   </div>
                                                   <div className="grid grid-cols-2 gap-3">
                                                       <div className="space-y-1">
                                                           <label className="text-[9px] font-black text-purple-400 uppercase tracking-widest ml-1">Maks. Pengguna</label>
                                                           <input type="number" required value={promoForm.maxUses} onChange={(e)=>setPromoForm({...promoForm, maxUses: e.target.value})} placeholder="Contoh: 100" className="w-full bg-white/5 p-3 rounded-xl text-white text-sm border border-purple-500/30 focus:border-purple-500 font-mono"/>
                                                       </div>
                                                       <div className="space-y-1">
                                                           <label className="text-[9px] font-black text-purple-400 uppercase tracking-widest ml-1">Min. Belanja (Rp)</label>
                                                           <input type="number" value={promoForm.minPurchase} onChange={(e)=>setPromoForm({...promoForm, minPurchase: e.target.value})} placeholder="Opsional (0)" className="w-full bg-white/5 p-3 rounded-xl text-white text-sm border border-purple-500/30 focus:border-purple-500 font-mono"/>
                                                       </div>
                                                   </div>
                                                </div>
                                             )}

                                             {promoModalType==='day' && (
                                                <div className="space-y-1 pt-2 border-t border-white/10">
                                                    <label className="text-[9px] font-black text-emerald-500 uppercase tracking-widest ml-1">Pilih Hari Aktif Promo Harian</label>
                                                    <select value={promoForm.targetDay} onChange={(e)=>setPromoForm({...promoForm, targetDay: e.target.value})} className="w-full bg-white/5 p-3.5 rounded-xl text-white text-sm border border-emerald-500/30 focus:border-emerald-500 appearance-none">
                                                        <option value="1">Senin</option><option value="2">Selasa</option><option value="3">Rabu</option><option value="4">Kamis</option><option value="5">Jumat</option><option value="6">Sabtu</option><option value="0">Minggu</option>
                                                    </select>
                                                </div>
                                             )}
                                         </div>
                                         
                                         <button type="submit" className="w-full bg-white hover:bg-gray-200 text-black py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-xl mt-8 transition transform hover:-translate-y-1">Terbitkan Promo Ke Server</button>
                                      </form>
                                   </div>

                                   {/* List Promo Database */}
                                   <div className="lg:col-span-7 bg-black/40 rounded-[2.5rem] p-6 md:p-8 border border-white/10 shadow-inner flex flex-col h-full">
                                      <h3 className="text-lg font-black text-white mb-2">Database Promosi Aktif</h3>
                                      <p className="text-[10px] text-gray-500 mb-6">Daftar semua promo yang sedang atau pernah berjalan di sistem.</p>
                                      
                                      <div className="grid grid-cols-1 gap-4 overflow-y-auto custom-scrollbar pr-2 flex-1 pb-6">
                                         {(promos||[]).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).map(p => (
                                            <div key={p.id} className={`p-5 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border transition-all shadow-sm relative overflow-hidden group ${p.category === 'flash' ? 'border-red-500/30 bg-gradient-to-r from-black to-red-950/30' : p.category === 'code' ? 'border-purple-500/30 bg-gradient-to-r from-black to-purple-950/30' : p.category === 'game' ? 'border-blue-500/30 bg-gradient-to-r from-black to-blue-950/30' : 'border-white/10 bg-white/5'} ${!p.isActive && 'opacity-40 grayscale'}`}>
                                               
                                               <div className="flex-1 min-w-0 z-10 relative">
                                                  <div className="flex items-center gap-2 mb-2">
                                                     {p.category === 'flash' && <span className="bg-red-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">⚡ Flash Sale</span>}
                                                     {p.category === 'code' && <span className="bg-purple-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">🔑 Kode Kupon</span>}
                                                     {p.category === 'item' && <span className="bg-orange-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">🎯 Diskon Spesifik</span>}
                                                     {p.category === 'game' && <span className="bg-blue-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">🎮 Promo Game</span>}
                                                     {p.category === 'day' && <span className="bg-emerald-500 text-white text-[8px] px-2 py-1 rounded font-black uppercase tracking-widest shadow-sm">📅 Event Harian</span>}
                                                     <div className="text-base font-black font-mono tracking-widest text-white truncate max-w-[150px]">{p.code || (p.id||'').split('_')[0]}</div>
                                                  </div>
                                                  
                                                  <div className="text-sm font-bold text-gray-300">
                                                     {p.type === 'percentage' ? <span className="text-orange-400">Potongan {p.discount}% Off</span> : <span className="text-emerald-400">Diskon Tunai {formatRupiah(p.discount)}</span>}
                                                  </div>
                                                  
                                                  <div className="flex flex-wrap gap-2 mt-3">
                                                     {p.minPurchase > 0 && <span className="text-[9px] bg-black/50 border border-white/10 px-2 py-1 rounded text-gray-400 font-mono">Min: {formatRupiah(p.minPurchase)}</span>}
                                                     {p.targetItems?.length > 0 && <span className="text-[9px] bg-black/50 border border-orange-500/30 px-2 py-1 rounded text-orange-400 font-bold truncate max-w-[150px]">Khusus: {(items||[]).find(i=>i.id===p.targetItems[0])?.name || 'Item Terpilih'}</span>}
                                                     {p.targetGame && <span className="text-[9px] bg-black/50 border border-blue-500/30 px-2 py-1 rounded text-blue-400 font-bold truncate max-w-[150px]">Semua Item: {(games||[]).find(g=>g.id===p.targetGame)?.name || 'Game Terpilih'}</span>}
                                                     {(p.maxUses || p.stock) && <span className={`text-[9px] bg-black/50 border px-2 py-1 rounded font-mono font-bold ${((p.usedBy||[]).length >= (p.maxUses || p.stock)) ? 'border-red-500/30 text-red-500' : 'border-white/10 text-gray-400'}`}>Terpakai: {(p.usedBy||[]).length||0} / {p.maxUses || p.stock}</span>}
                                                  </div>
                                               </div>
                                               
                                               <div className="flex gap-2 w-full sm:w-auto mt-3 sm:mt-0 shrink-0 z-10 relative">
                                                  <button onClick={() => togglePromoStatus(p.id, p.isActive)} className={`w-12 h-10 rounded-xl transition-all flex items-center justify-center border shadow-inner ${p.isActive ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500 hover:text-white' : 'bg-gray-800/50 text-gray-500 border-gray-700 hover:bg-gray-600 hover:text-white'}`} title={p.isActive ? 'Nonaktifkan Promo' : 'Aktifkan Kembali'}>
                                                     {p.isActive ? <IconCheckCircle className="w-5 h-5"/> : <IconBlock className="w-5 h-5"/>}
                                                  </button>
                                                  <button onClick={() => handleDeletePromo(p.id)} className="w-12 h-10 bg-black/50 border border-red-500/20 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition flex items-center justify-center shadow-inner group-hover:border-red-500/50" title="Hapus Permanen">
                                                     <IconTrash className="w-4 h-4"/>
                                                  </button>
                                               </div>
                                            </div>
                                         ))}
                                         {(!promos || promos.length === 0) && (
                                            <div className="flex flex-col items-center justify-center py-24 text-gray-600 border border-dashed border-white/10 rounded-[2rem] bg-white/[0.02]">
                                               <IconPercent className="w-12 h-12 mb-4 opacity-30"/>
                                               <span className="font-bold text-sm">Database promo kosong. Terbitkan promo pertama Anda.</span>
                                            </div>
                                         )}
                                      </div>
                                   </div>
                               </div>
                           </div>
                        )}

                     </div>
                  </div>
               </div>
            )}

            </div>
          </main>
          
          {/* Main Footer (Hanya sembunyikan di halaman Chat User) */}
          {currentView !== 'chat' && <MainFooter socialLinks={socialLinks} />}
        </div>
      );
    }
    
    // Aplikasi Root Entry - Bebas Crash
    const App = () => {
        return (
           <ToastProvider>
               <AppCore />
           </ToastProvider>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
