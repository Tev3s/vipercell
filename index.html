      return new Promise((resolve, reject) => {

          const img = new Image(); img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } } 
            else { if (h > maxWidth) { w *= maxWidth / h; h = maxWidth; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          };
        }; reader.onerror = reject;
      });

    // --- COMPONENT: BANNER SLIDER ---
    const BannerSlider = ({ items }) => {

    function App() {
      // --- THEME & GLOBAL UI ---
      const [isDarkMode, setIsDarkMode] = useState(true);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, msg: '', action: null });
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      const cancelConfirm = () => setConfirmModal({ isOpen: false, msg: '', action: null });

      useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');

      // --- AUTH STATE ---
      const [authUser, setAuthUser] = useState(null);
      const [isAuthChecking, setIsAuthChecking] = useState(true);
      const [authMode, setAuthMode] = useState('login');
      const [regName, setRegName] = useState(''); 
      const [regPhone, setRegPhone] = useState(''); 
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [authMessage, setAuthMessage] = useState({ text: '', type: '' });
      const [resetCooldown, setResetCooldown] = useState(0);

      // --- PROFILE STATE (DIRECT FETCH) ---
      const [currentUserData, setCurrentUserData] = useState(null);
      const [showPasswordForm, setShowPasswordForm] = useState(false);
      const [currentPassword, setCurrentPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmNewPassword, setConfirmNewPassword] = useState('');
      const [passwordMessage, setPasswordMessage] = useState('');
      const [uploadingAvatar, setUploadingAvatar] = useState(false);
      const [avatarMessage, setAvatarMessage] = useState('');
      const [profileName, setProfileName] = useState('');
      const [profilePhone, setProfilePhone] = useState('');
      const [profileAvatar, setProfileAvatar] = useState('');
      const [profileSaveMsg, setProfileSaveMsg] = useState('');

      // --- DB STATES (COLLECTIONS) ---
      const [isStoreOpen, setIsStoreOpen] = useState(true);
      const [games, setGames] = useState([]);
      const [items, setItems] = useState([]); 
      const [promos, setPromos] = useState([]); 
      const [banners, setBanners] = useState([]); 
      const [galleryData, setGalleryData] = useState([]);
      const [runningTexts, setRunningTexts] = useState([]);
      const [socialLinks, setSocialLinks] = useState({ ig: '', wa: '', tt: '', tg: '' });

      // Admin States
      const [adminList, setAdminList] = useState([]);
      const [allGlobalOrders, setAllGlobalOrders] = useState([]); 
      const isSuperAdmin = authUser?.email === ADMIN_EMAIL;
      const isAdmin = isSuperAdmin || adminList.includes(authUser?.email);

      // --- VIEW CONTROLLERS ---
      const [currentView, setCurrentView] = useState('home'); 
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const navigateTo = (view) => {
         setCurrentView(view); setIsMenuOpen(false); setMobileMenuOpen(false);
         if (view !== 'home') { setSelectedGame(null); setSelectedNominal(null); setSelectedPayment(null); setActivePromo(null); setInputPromo(''); setUserId(''); setZoneId(''); }
      };

      // --- ADMIN LOCAL STATES ---
      const [activeAdminTab, setActiveAdminTab] = useState('dashboard');
      const [adminSelectedGame, setAdminSelectedGame] = useState('');
      const [editingItemId, setEditingItemId] = useState(null);
      const [newItemName, setNewItemName] = useState('');
      const [newItemPrice, setNewItemPrice] = useState('');
      const [itemNotice, setItemNotice] = useState('');
      const [editingGameId, setEditingGameId] = useState(null);
      const [newGameId, setNewGameId] = useState('');
      const [newGameName, setNewGameName] = useState('');
      const [newGameDev, setNewGameDev] = useState('');
      const [newGameImg, setNewGameImg] = useState('');
      const [newGameInput, setNewGameInput] = useState('id_zone');
      const [uploadingGameImg, setUploadingGameImg] = useState(false);
      const [adminBannerUrl, setAdminBannerUrl] = useState('');

      const [adminWA, setAdminWA] = useState('');
      const [adminTT, setAdminTT] = useState('');
      const [adminTG, setAdminTG] = useState('');
      
      // Promo Admin States
      const [newPromoType, setNewPromoType] = useState(PROMO_TYPES.PERCENTAGE);
      const [newPromoCode, setNewPromoCode] = useState('');
      const [newPromoDiscount, setNewPromoDiscount] = useState('');
      const [newPromoMax, setNewPromoMax] = useState('');
      const [newPromoMinPurchase, setNewPromoMinPurchase] = useState('');
      const [newPromoIsFlashSale, setNewPromoIsFlashSale] = useState(false); 
      
      const [newAdminEmail, setNewAdminEmail] = useState('');
      const [adminOrderSearch, setAdminOrderSearch] = useState('');
      const [isScannerOpen, setIsScannerOpen] = useState(false); 
      const [scannedOrder, setScannedOrder] = useState(null);
      const [scannerError, setScannerError] = useState('');

      // --- USER APP STATE ---
      const [selectedGame, setSelectedGame] = useState(null);
      const [userId, setUserId] = useState('');
      const [zoneId, setZoneId] = useState('');
      const [selectedNominal, setSelectedNominal] = useState(null);
      const [selectedPayment, setSelectedPayment] = useState(null);
      const [inputPromo, setInputPromo] = useState('');
      const [activePromo, setActivePromo] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [dynamicQrisUrl, setDynamicQrisUrl] = useState('');
      const [lastOrderId, setLastOrderId] = useState(''); 
      const [activeOrderDetails, setActiveOrderDetails] = useState(null);

      const [adminOrders, setAdminOrders] = useState([]);

      const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);

      useEffect(() => {
         if (games.length > 0 && !adminSelectedGame) setAdminSelectedGame(games[0].id);
      }, [games, adminSelectedGame]);

      useEffect(() => {
        if(lastOrderId && allGlobalOrders.length > 0) {
           const found = allGlobalOrders.find(o => o.id === lastOrderId);
           setActiveOrderDetails(found || null);
        }
      }, [lastOrderId, allGlobalOrders]);

      useEffect(() => {
         const handleKeyDown = (e) => {
            if (e.key === 'Escape') {
               if (confirmModal.isOpen) cancelConfirm();
               else if (showModal) setShowModal(false);
               else if (isScannerOpen) setIsScannerOpen(false);
               else if (scannedOrder) setScannedOrder(null);
               else if (isMenuOpen) setIsMenuOpen(false);
               else if (mobileMenuOpen) setMobileMenuOpen(false);
               else if (selectedGame && currentView === 'home') { setSelectedGame(null); setActivePromo(null); setInputPromo(''); }
            }
         };
         window.addEventListener('keydown', handleKeyDown); return () => window.removeEventListener('keydown', handleKeyDown);
      }, [confirmModal.isOpen, showModal, isScannerOpen, scannedOrder, currentView, selectedGame, isMenuOpen, mobileMenuOpen]);

      // --- REFACTORED DB FETCHING ---
      useEffect(() => {
         const globalRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'config', 'global');
         const unsubGlobal = onSnapshot(globalRef, (snap) => {
            if (snap.exists()) {
               const d = snap.data();
               setIsStoreOpen(d.isOpen ?? true);
               setSocialLinks({ ig: d.igLink||'', wa: d.waLink||'', tt: d.ttLink||'', tg: d.tgLink||'' });

               setBanners(d.banners || []);
               setGalleryData(d.gallery || []);

               if(isSuperAdmin) {
                 setDoc(globalRef, { isOpen: true, runningTexts: ['⚡ Flash Sale Hari Ini!', '🚀 Top Up Cepat & Aman'], banners: [], gallery: [] }).catch(()=>{});

         const unsubGames = onSnapshot(collection(db, 'artifacts', safeAppId, 'public', 'data', 'games'), (snap) => {
             const g = []; snap.forEach(doc => g.push({id: doc.id, ...doc.data()}));
             setGames(g);
         });

         const unsubItems = onSnapshot(collection(db, 'artifacts', safeAppId, 'public', 'data', 'items'), (snap) => {
             const i = []; snap.forEach(doc => i.push({id: doc.id, ...doc.data()}));
             setItems(i);
         });

         const unsubPromos = onSnapshot(collection(db, 'artifacts', safeAppId, 'public', 'data', 'promos'), (snap) => {
             const p = []; snap.forEach(doc => p.push({id: doc.id, ...doc.data()}));
             setPromos(p);
         });

         return () => { unsubGlobal(); unsubGames(); unsubItems(); unsubPromos(); };
      }, [isSuperAdmin]);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          setAuthUser(user); setIsAuthChecking(false);
          if(user) {
             getDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'config', 'admins')).then(d => { 
                if(d.exists()) setAdminList(d.data().emails || []); 
             });
          }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
         if(!authUser) return;
         const userRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'members', authUser.uid);
         const unsubUser = onSnapshot(userRef, (docSnap) => {
            if(docSnap.exists()) {
               setCurrentUserData({ id: docSnap.id, ...docSnap.data() });
            } else {
               setDoc(userRef, { email: authUser.email, name: authUser.email.split('@')[0], createdAt: new Date().toISOString(), lastLogin: new Date().toISOString() });
            }
         });
         return () => unsubUser();
      }, [authUser]);

      useEffect(() => {
         if (!authUser) return;
         const unsubOrders = onSnapshot(collection(db, 'artifacts', safeAppId, 'public', 'data', 'global_orders'), (snap) => {
            const fetchedAll = []; snap.forEach(d => fetchedAll.push({ id: d.id, ...d.data() }));
            const getStatusScore = (s) => s === 'Pending' ? 1 : s === 'Sukses' ? 2 : 3;
            fetchedAll.sort((a,b) => getStatusScore(a.status) !== getStatusScore(b.status) ? getStatusScore(a.status) - getStatusScore(b.status) : new Date(b.createdAt) - new Date(a.createdAt));
            setAllGlobalOrders(fetchedAll);
            if (isAdmin) setAdminOrders(fetchedAll); else setUserOrders(fetchedAll.filter(o => o.userEmail === authUser.email));
         });
         return () => unsubOrders();
      }, [authUser, isAdmin]);

      useEffect(() => {
         if (currentView === 'profile' && currentUserData) {
            setProfileName(currentUserData.name || ''); 
            setProfilePhone(currentUserData.phone || '');
            setProfileAvatar(currentUserData.avatar || '');
            setProfileSaveMsg('');
         }
      }, [currentView, currentUserData]);

      useEffect(() => {
         setAdminIG(socialLinks.ig); setAdminWA(socialLinks.wa); setAdminTT(socialLinks.tt); setAdminTG(socialLinks.tg);
      }, [socialLinks]);

      const pendingOrdersCount = adminOrders.filter(o => o.status === 'Pending').length;

      useEffect(() => {
         let html5QrCode;
         if (isScannerOpen) {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: (w, h) => ({ width: Math.floor(Math.min(w,h)*0.8), height: Math.floor(Math.min(w,h)*0.8) }), aspectRatio: window.innerHeight / window.innerWidth },
               (decodedText) => {
                  const matchedOrder = adminOrders.find(o => o.id === decodedText);
                  if (matchedOrder) { playSuccessBeep(); setScannedOrder(matchedOrder); setIsScannerOpen(false); } 
                  else { setScannerError("ID Pesanan tidak valid."); setTimeout(() => setScannerError(''), 3500); }
               }, (err) => {}
            ).catch(err => { alert("Kamera tidak dapat diakses."); setIsScannerOpen(false); });
         }
         return () => { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(e => console.log(e)); };
      }, [isScannerOpen, adminOrders]);

      // --- USER ACTIONS ---
      const handleAuth = async (e) => {
        e.preventDefault(); setAuthMessage({ text: '', type: '' }); setAuthLoading(true);
        try {
          if (authMode === 'register') {
             if(!regName) throw new Error('Nama pengguna wajib diisi!');
             const cred = await createUserWithEmailAndPassword(auth, email, password);
             const now = new Date().toISOString();
             await setDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'members', cred.user.uid), { 
                email: cred.user.email, name: regName, phone: regPhone || '', lastLogin: now, createdAt: now, avatar: ''
             });
             await sendEmailVerification(cred.user); await signOut(auth); 
             setAuthMessage({ text: 'Registrasi berhasil! Cek Inbox/SPAM email untuk verifikasi.', type: 'success' }); setAuthMode('login');
          }
          else if (authMode === 'login') {
             const cred = await signInWithEmailAndPassword(auth, email, password);
             if (!cred.user.emailVerified && cred.user.email !== ADMIN_EMAIL) { await signOut(auth); throw new Error('email-not-verified'); }
             await setDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'members', cred.user.uid), { lastLogin: new Date().toISOString() }, { merge: true });
          }
          else if (authMode === 'forgot') {
            if (resetCooldown > 0) return;
            await sendPasswordResetEmail(auth, email); setAuthMessage({ text: 'Tautan reset terkirim! Periksa SPAM Anda.', type: 'success' }); setResetCooldown(180);
          }
        } catch (error) {
          let msg = error.message;
          if (error.message === 'email-not-verified') msg = 'Email belum diverifikasi! Silakan cek Inbox/SPAM Anda.';
          else if (error.message === 'Nama pengguna wajib diisi!') msg = error.message;
          else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') msg = 'Password salah / Akun tidak valid!';
          else if (error.code === 'auth/user-not-found') { msg = 'Email tidak terdaftar! Silakan daftar akun.'; setAuthMode('register'); }
          else if (error.code === 'auth/email-already-in-use') msg = 'Email sudah terdaftar!';
          else if (error.code === 'auth/weak-password') msg = 'Password minimal 6 karakter!';
          setAuthMessage({ text: msg, type: 'error' });
        } finally { setAuthLoading(false); }
      };

      const handleUpdateProfile = async (e) => {
         e.preventDefault(); if(!currentUserData) return;
         try {
            await setDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'members', authUser.uid), { name: profileName, phone: profilePhone }, { merge: true });
            setProfileSaveMsg('Profil berhasil disimpan!'); setTimeout(() => setProfileSaveMsg(''), 3000);
         } catch(err) { setProfileSaveMsg('Gagal menyimpan profil.'); setTimeout(() => setProfileSaveMsg(''), 3000); }
      }

      const handleAvatarUpload = async (e) => {
        const file = e.target.files[0]; if (!file || !currentUserData) return;
        setUploadingAvatar(true); setAvatarMessage('');
        try {
          const compressedAvatar = await compressImage(file, 200);
          await setDoc(doc(db, 'artifacts', safeAppId, 'public', 'data', 'members', authUser.uid), { avatar: compressedAvatar }, { merge: true });
          setProfileAvatar(compressedAvatar); setAvatarMessage({ text: 'Foto berhasil diperbarui!', type: 'success' });
        } catch (error) { setAvatarMessage({ text: 'Gagal mengupload foto.', type: 'error' }); } 
        finally { setUploadingAvatar(false); setTimeout(() => setAvatarMessage(''), 3000); }
      };

      const handleChangePassword = async (e) => {
        e.preventDefault(); setPasswordMessage('');
        if (!currentPassword || !newPassword || !confirmNewPassword) return setPasswordMessage({ text: 'Semua field harus diisi!', type: 'error' });
        if (newPassword !== confirmNewPassword) return setPasswordMessage({ text: 'Password baru tidak cocok!', type: 'error' });
        if (newPassword.length < 6) return setPasswordMessage({ text: 'Password minimal 6 karakter!', type: 'error' });

        try {
          const user = auth.currentUser; const credential = EmailAuthProvider.credential(user.email, currentPassword);
          await reauthenticateWithCredential(user, credential); await updatePassword(user, newPassword);
          setPasswordMessage({ text: 'Password berhasil diubah!', type: 'success' });
          setCurrentPassword(''); setNewPassword(''); setConfirmNewPassword(''); setShowPasswordForm(false);
        } catch (error) {
          setPasswordMessage({ text: error.code === 'auth/wrong-password' ? 'Password saat ini salah!' : 'Gagal mengubah password.', type: 'error' });
        }
      };

      const handleApplyPromo = () => {
         const promo = promos.find(p => p.code.toUpperCase() === inputPromo.toUpperCase() && p.isActive !== false);
         if (!promo) return alert('Kode promo tidak valid atau kadaluarsa.');

                                 {/* SOSIAL MEDIA */}
                                 <div className="bg-[#0a0a0a] p-6 md:p-8 rounded-[2.5rem] border border-white/5 shadow-inner">
                                    <h3 className="text-lg font-black text-white mb-6">Tautan Kontak & Sosial</h3>
                                    <div className="space-y-4">
                                       <div className="relative">
                                          <IconInstagram className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"/>
                                          <input type="text" value={adminIG} onChange={(e)=>setAdminIG(e.target.value)} className="w-full bg-black border border-white/10 rounded-xl py-3 pl-11 pr-4 text-sm focus:border-blue-500 transition" placeholder="URL Instagram" />
                                       </div>
                                       <div className="relative">
                                          <IconWhatsapp className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"/>
                                          <input type="text" value={adminWA} onChange={(e)=>setAdminWA(e.target.value)} className="w-full bg-black border border-white/10 rounded-xl py-3 pl-11 pr-4 text-sm focus:border-blue-500 transition" placeholder="URL WhatsApp" />
                                       </div>
                                       <div className="relative">
                                          <IconTiktok className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"/>
                                          <input type="text" value={adminTT} onChange={(e)=>setAdminTT(e.target.value)} className="w-full bg-black border border-white/10 rounded-xl py-3 pl-11 pr-4 text-sm focus:border-blue-500 transition" placeholder="URL TikTok" />
                                       </div>
                                       <button onClick={saveSettingsLinks} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-xl font-black text-xs uppercase tracking-widest transition shadow-lg mt-2">Update Kontak</button>
                                    </div>
                                 </div>
                              </div>
                              
                              {/* TEKS BERJALAN */}
                              <div className="bg-[#0a0a0a] p-6 md:p-8 rounded-[2.5rem] border border-white/5 shadow-inner">
                                 <h3 className="text-lg font-black text-white mb-2 flex items-center gap-2"><IconTag className="w-5 h-5 text-orange-500"/> Header Teks Berjalan (Marquee)</h3>
                                 <p className="text-xs text-gray-500 mb-6">Tulis informasi promo yang bergerak di navigasi atas. Kosongkan baris untuk menghapus.</p>
                                 <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {[0, 1, 2, 3].map((idx) => (
                                       <div key={idx} className="flex items-center gap-3">
                                          <span className="text-xs font-black text-gray-600 bg-white/5 px-3 py-2 rounded-lg">{idx + 1}</span>
                                          <input type="text" value={runningTexts[idx] || ''} onChange={(e) => handleRunningTextChange(idx, e.target.value)} className="w-full bg-black border border-white/10 rounded-xl py-3 px-4 text-sm focus:border-orange-500 transition" placeholder="Informasi singkat..." />
                                       </div>
                                    ))}
                                 </div>
                                 <button onClick={saveRunningTexts} className="mt-6 bg-orange-600 hover:bg-orange-500 text-white px-8 py-3.5 rounded-xl font-black text-xs uppercase tracking-widest transition shadow-lg">Simpan Teks</button>
                              </div>

                              {/* MEDIA: BANNERS & GALERI */}
                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                 <div className="bg-[#0a0a0a] p-6 md:p-8 rounded-[2.5rem] border border-white/5 shadow-inner flex flex-col">
                                    <h3 className="text-lg font-black text-white mb-6">Slider Banner (Home)</h3>
                                    <div className="flex gap-2 mb-4">
                                       <input type="text" value={adminBannerUrl} onChange={(e)=>setAdminBannerUrl(e.target.value)} className="flex-1 bg-black border border-white/10 rounded-xl py-3 px-4 text-sm focus:border-blue-500 transition" placeholder="Tempel URL Banner/Youtube" />
                                       <button onClick={() => handleAddBanner(getYouTubeId(adminBannerUrl)?'youtube':'image', adminBannerUrl)} className="bg-white text-black px-5 rounded-xl font-black transition text-xl">+</button>
                                    </div>
                                    <div className="relative group mb-6">
                                       <input type="file" accept="image/*" onChange={handleBannerUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                       <div className="bg-white/5 border border-dashed border-white/20 group-hover:border-white/50 rounded-xl p-4 flex items-center justify-center gap-2 text-gray-400 text-xs font-bold transition">
                                          <IconUpload className="w-4 h-4"/> Upload dari Perangkat (Max 2MB)
                                       </div>
                                    </div>
                                    <div className="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
                                       {banners.map((b, i) => (
                                          <div key={i} className="relative w-32 h-20 flex-shrink-0 rounded-xl overflow-hidden border border-white/10 group bg-black">
                                             <img src={b.type === 'youtube' ? `https://img.youtube.com/vi/${getYouTubeId(b.url)}/hqdefault.jpg` : b.url} className="w-full h-full object-cover opacity-60 group-hover:scale-110 transition duration-500" />
                                             <button onClick={() => handleDeleteBanner(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-5 h-5 text-white"/></button>
                                          </div>
                                       ))}
                                    </div>
                                 </div>

                                 <div className="bg-[#0a0a0a] p-6 md:p-8 rounded-[2.5rem] border border-white/5 shadow-inner flex flex-col">
                                    <div className="flex justify-between items-center mb-6">
                                       <h3 className="text-lg font-black text-white">Galeri Toko <span className="text-[10px] bg-white/10 px-2 py-0.5 rounded-md font-mono align-middle ml-2">{galleryData.length}/10</span></h3>
                                       <div className="relative group w-10 h-10">
                                          <input type="file" accept="image/*" onChange={handleGalleryUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                          <button className="absolute inset-0 bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl flex items-center justify-center font-black transition">+</button>
                                       </div>
                                    </div>
                                    <div className="grid grid-cols-4 gap-3">
                                       {galleryData.map((img, i) => (
                                          <div key={i} className="relative aspect-square rounded-xl overflow-hidden border border-white/10 group">
                                             <img src={img} className="w-full h-full object-cover opacity-80 group-hover:scale-110 transition duration-500" />
                                             <button onClick={()=>handleRemoveGallery(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-4 h-4 text-white"/></button>
                                          </div>
                                       ))}
                                    </div>
                                 </div>
                              </div>

                              {/* AKSES SUPER ADMIN */}
                              {isSuperAdmin && (
                                 <div className="bg-red-900/10 p-6 md:p-8 rounded-[2.5rem] border border-red-500/20 shadow-inner relative overflow-hidden">
                                    <h3 className="text-lg font-black text-red-400 mb-6 flex items-center gap-2"><IconShieldAlert className="w-5 h-5"/> Akses Karyawan</h3>
                                    <form onSubmit={handleAddAdmin} className="flex gap-2 max-w-md mb-6">
                                       <input type="email" required value={newAdminEmail} onChange={(e)=>setNewAdminEmail(e.target.value)} placeholder="Email admin baru..." className="flex-1 bg-black border border-white/10 rounded-xl py-3 px-4 text-sm focus:border-red-500 transition" />
                                       <button type="submit" className="bg-red-600 hover:bg-red-500 text-white px-6 rounded-xl font-black transition text-sm shadow-lg">Tambah</button>
                                    </form>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                       <div className="flex justify-between items-center bg-red-500/20 border border-red-500/30 p-4 rounded-2xl shadow-inner">
                                          <span className="text-sm font-black text-red-300 truncate">{ADMIN_EMAIL}</span>
                                          <span className="text-[9px] bg-red-600 text-white px-2 py-1 rounded font-black uppercase tracking-widest ml-2">Owner</span>
                                       </div>
                                       {adminList.map(em => (
                                          <div key={em} className="flex justify-between items-center bg-black/40 border border-white/5 p-4 rounded-2xl transition">
                                             <span className="text-sm text-gray-300 font-bold truncate">{em}</span>
                                             <button onClick={() => handleRemoveAdmin(em)} className="text-gray-500 hover:text-red-400 transition bg-white/5 p-2 rounded-lg ml-2"><IconX className="w-3.5 h-3.5"/></button>
                                          </div>
                                       ))}
                                    </div>
                                 </div>
                              )}
                           </div>
                        )}
                     </div>
                  </div>
               </div>
            )}
            
            </div>
          </main>
          
          <MainFooter socialLinks={socialLinks} />
          
          {/* Modal Berhasil Top Up */}
          {showModal && (
             <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-[#050505]/90 backdrop-blur-md animate-in fade-in duration-300">
                <div className="glass-panel rounded-[3rem] p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(0,0,0,0.8)] relative overflow-hidden transform scale-in-center">
                   <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-400 to-emerald-500"></div>
                   
                   <div className="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner border border-emerald-500/20">
                      <IconCheckCircle className="w-10 h-10 text-emerald-400 drop-shadow-md" />
                   </div>
                   
                   <h3 className="text-2xl font-black text-white mb-1">Pesanan Berhasil!</h3>
                   <p className="text-gray-400 text-xs font-bold mb-6">Selesaikan pembayaran agar diproses otomatis.</p>
                   
                   <div className="bg-[#0a0a0a] border border-white/5 rounded-2xl p-5 mb-8 text-left shadow-inner">
                      <div className="flex justify-between items-center mb-3 pb-3 border-b border-white/5">
                         <span className="text-[10px] text-gray-500 uppercase font-black tracking-widest">ID Transaksi</span>
                         <span className="font-mono text-xs font-bold text-gray-300">{lastOrderId}</span>
                      </div>
                      <div className="flex justify-between items-center mb-3">
                         <span className="text-[10px] text-gray-500 uppercase font-black tracking-widest">Total Tagihan</span>
                         <span className="font-black text-xl text-emerald-400 drop-shadow-sm">{formatRupiah(activeOrderDetails?.priceTotal || 0)}</span>
                      </div>
                      
                      {selectedPayment?.id === 'qris' && dynamicQrisUrl && (
                         <div className="mt-5 flex flex-col items-center animate-in slide-in-from-bottom-2 bg-white p-3 rounded-2xl">
                            <img src={dynamicQrisUrl} alt="QRIS" className="w-48 h-48 object-contain mix-blend-multiply" />
                            <p className="text-[10px] font-black text-black uppercase tracking-widest mt-2">Scan & Bayar</p>
                         </div>
                      )}
                      
                      {selectedPayment?.id === 'cash' && (
                         <div className="mt-4 text-center bg-orange-500/10 p-4 rounded-xl border border-orange-500/20">
                            <p className="text-[10px] font-bold text-orange-400 leading-relaxed uppercase tracking-wide">Tunjukkan ID Pesanan ini ke kasir untuk proses pembayaran Tunai.</p>
                         </div>
                      )}
                   </div>

                   <button onClick={() => {setShowModal(false); navigateTo('history');}} className="w-full bg-white text-black hover:bg-gray-200 py-4.5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl">
                      Periksa Status
                   </button>
                </div>
             </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
