    const generateDynamicQRIS = (baseQRIS, amount) => {
      let qris = baseQRIS.slice(0, -8);

        qris += `54${amtLen}${amtStr}`;
      }
      qris += "6304";
      let crc = 0xFFFF;
      for (let i = 0; i < qris.length; i++) {
        crc ^= qris.charCodeAt(i) << 8;
        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
          else crc = (crc << 1) & 0xFFFF;
        }
      }
      return qris + crc.toString(16).toUpperCase().padStart(4, '0');
    };

                                    </div>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                       <div className="flex-1 relative">
                                          <IconTiktok className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500"/>
                                          <input type="text" value={adminTT || ''} onChange={(e)=>setAdminTT(e.target.value)} className="w-full bg-white dark:bg-black border border-gray-200 dark:border-white/10 rounded-xl py-2.5 pl-9 pr-3 text-xs focus:border-blue-500 transition text-gray-900 dark:text-white shadow-sm" placeholder="URL TikTok" />
                                       </div>
                                       <button onClick={saveSettingsLinks} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-lg py-2.5 sm:py-0">Simpan Kontak</button>
                                    </div>
                                 </div>
                              </div>
                              
                              {/* TEKS BERJALAN & BANNERS */}
                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                 {/* TEKS BERJALAN */}
                                 <div className="bg-gray-50 dark:bg-[#0a0a0a] p-6 rounded-[2.5rem] border border-gray-200 dark:border-white/5 shadow-inner">
                                    <div className="flex justify-between items-start mb-4">
                                       <div>
                                          <h3 className="text-sm font-black text-gray-900 dark:text-white flex items-center gap-2"><IconTag className="w-4 h-4 text-orange-500"/> Header Teks Berjalan</h3>
                                          <p className="text-[10px] text-gray-500 mt-1">Kosongkan kotak untuk menghapus teks.</p>
                                       </div>
                                       <button onClick={saveRunningTexts} className="bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-lg shadow-orange-500/20">Simpan</button>
                                    </div>
                                    
                                    <div className="space-y-2">
                                       {(runningTexts||[]).map((text, idx) => (
                                          <div key={idx} className="flex items-center gap-2">
                                             <button onClick={() => handleRemoveRunningText(idx)} className="p-2 text-gray-400 hover:text-red-500 transition"><IconX className="w-3.5 h-3.5"/></button>
                                             <input type="text" value={text} onChange={(e) => handleRunningTextChange(idx, e.target.value)} className="w-full bg-white dark:bg-black border border-gray-200 dark:border-white/10 rounded-lg py-2 px-3 text-xs focus:border-orange-500 transition shadow-sm text-gray-900 dark:text-white" placeholder="Teks..." />
                                          </div>
                                       ))}
                                       {(runningTexts||[]).length < 5 && (
                                          <div className="flex items-center gap-2 mt-2">
                                             <div className="p-2 text-gray-300 dark:text-gray-700"><IconZap className="w-3.5 h-3.5"/></div>
                                             <div className="flex gap-2 w-full">
                                                <input type="text" value={newRunningText} onChange={(e) => setNewRunningText(e.target.value)} className="w-full bg-white dark:bg-white/5 border border-dashed border-gray-300 dark:border-white/20 rounded-lg py-2 px-3 text-xs focus:border-orange-500 transition text-gray-900 dark:text-white" placeholder="Tambah teks baru..." />
                                                <button onClick={handleAddRunningText} disabled={!newRunningText.trim()} className="bg-gray-200 dark:bg-white/10 text-gray-700 dark:text-white px-3 rounded-lg font-black text-lg disabled:opacity-50">+</button>
                                             </div>
                                          </div>
                                       )}
                                    </div>
                                 </div>

                                 {/* SLIDER BANNER */}
                                 <div className="bg-gray-50 dark:bg-[#0a0a0a] p-6 md:p-8 rounded-[2.5rem] border border-gray-200 dark:border-white/5 shadow-inner flex flex-col">
                                    <h3 className="text-lg font-black text-gray-900 dark:text-white mb-6">Slider Banner (Home)</h3>
                                    <div className="flex gap-2 mb-4">
                                       <input type="text" value={adminBannerUrl} onChange={(e)=>setAdminBannerUrl(e.target.value)} className="flex-1 bg-white dark:bg-black border border-gray-200 dark:border-white/10 rounded-xl py-3 px-4 text-sm focus:border-blue-500 transition shadow-sm text-gray-900 dark:text-white" placeholder="Tempel URL Banner/Youtube" />
                                       <button onClick={() => handleAddBanner(getYouTubeId(adminBannerUrl)?'youtube':'image', adminBannerUrl)} className="bg-gray-900 dark:bg-white text-white dark:text-black px-5 rounded-xl font-black transition text-xl shadow-md hover:bg-gray-700 dark:hover:bg-gray-200">+</button>
                                    </div>
                                    <div className="relative group mb-6">
                                       <input type="file" accept="image/*" onChange={handleBannerUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                       <div className="bg-white dark:bg-white/5 border border-dashed border-gray-300 dark:border-white/20 group-hover:border-blue-500 rounded-xl p-4 flex items-center justify-center gap-2 text-gray-500 dark:text-gray-400 text-xs font-bold transition shadow-sm">
                                          <IconUpload className="w-4 h-4"/> Upload Banner (Max 2MB)
                                       </div>
                                    </div>
                                    <div className="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
                                       {banners?.map((b, i) => (
                                          <div key={i} className="relative w-32 h-20 flex-shrink-0 rounded-xl overflow-hidden border border-gray-200 dark:border-white/10 group bg-gray-200 dark:bg-black shadow-sm">
                                             <img src={b?.type === 'youtube' ? `https://img.youtube.com/vi/${getYouTubeId(b?.url)}/hqdefault.jpg` : b?.url} className="w-full h-full object-cover opacity-80 group-hover:scale-110 transition duration-500" />
                                             <button onClick={() => handleDeleteBanner(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-5 h-5 text-white"/></button>
                                          </div>
                                       ))}
                                    </div>
                                 </div>
                              </div>

                              {/* GALERI ADMIN MANAGER & SUPER ADMIN */}
                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                 <div className="bg-gray-50 dark:bg-[#0a0a0a] p-6 md:p-8 rounded-[2.5rem] border border-gray-200 dark:border-white/5 shadow-inner flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                       <h3 className="text-sm font-black text-gray-900 dark:text-white">Galeri Toko <span className="text-[9px] bg-gray-200 dark:bg-white/10 px-2 py-0.5 rounded-md font-mono align-middle ml-1">{galleryData?.length || 0}/16</span></h3>
                                       <div className="relative group w-8 h-8">
                                          <input type="file" accept="image/*" onChange={handleGalleryUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                          <button className="absolute inset-0 bg-white dark:bg-white/10 hover:bg-gray-100 dark:hover:bg-white/20 border border-gray-200 dark:border-white/10 rounded-lg flex items-center justify-center font-black transition text-sm">+</button>
                                       </div>
                                    </div>
                                    <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-4 gap-2">
                                       {galleryData?.map((img, i) => (
                                          <div key={i} className="relative aspect-square rounded-lg overflow-hidden border border-gray-200 dark:border-white/10 group bg-gray-100 dark:bg-black shadow-sm">
                                             <img src={img} className="w-full h-full object-cover opacity-80 group-hover:scale-110 transition duration-500" />
                                             <button onClick={()=>handleRemoveGallery(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-3 h-3 text-white"/></button>
                                          </div>
                                       ))}
                                       {(!galleryData || galleryData.length === 0) && <p className="col-span-full text-xs text-gray-500 font-bold">Galeri kosong.</p>}
                                    </div>
                                 </div>

                                 {/* AKSES SUPER ADMIN */}
                                 {isSuperAdmin && (
                                    <div className="bg-red-50 dark:bg-red-900/10 p-6 rounded-[2.5rem] border border-red-200 dark:border-red-500/20 shadow-inner relative overflow-hidden flex flex-col">
                                       <div className="absolute -top-10 -right-10 w-32 h-32 bg-red-200 dark:bg-red-500/10 rounded-full blur-2xl pointer-events-none"></div>
                                       <h3 className="text-sm font-black text-red-600 dark:text-red-400 mb-4 flex items-center gap-2 relative z-10"><IconShieldAlert className="w-4 h-4"/> Akses Karyawan</h3>
                                       <form onSubmit={handleAddAdmin} className="flex gap-2 mb-4 relative z-10">
                                          <input type="email" required value={newAdminEmail} onChange={(e)=>setNewAdminEmail(e.target.value)} placeholder="Email admin..." className="flex-1 bg-white dark:bg-black border border-gray-200 dark:border-white/10 rounded-xl py-2.5 px-3 text-xs focus:border-red-500 transition text-gray-900 dark:text-white shadow-sm" />
                                          <button type="submit" className="bg-red-600 hover:bg-red-500 text-white px-4 rounded-xl font-black transition text-xs shadow-lg">Add</button>
                                       </form>
                                       <div className="space-y-2 relative z-10 overflow-y-auto custom-scrollbar flex-1">
                                          <div className="flex justify-between items-center bg-red-100 dark:bg-red-500/20 border border-red-200 dark:border-red-500/30 p-3 rounded-xl shadow-inner">
                                             <span className="text-xs font-black text-red-700 dark:text-red-300 truncate">{ADMIN_EMAIL}</span>
                                             <span className="text-[8px] bg-red-600 text-white px-2 py-0.5 rounded font-black uppercase tracking-widest ml-2">Owner</span>
                                          </div>
                                          {adminList?.map(em => (
                                             <div key={em} className="flex justify-between items-center bg-white dark:bg-black/40 border border-gray-200 dark:border-white/5 p-3 rounded-xl transition shadow-sm">
                                                <span className="text-xs text-gray-700 dark:text-gray-300 font-bold truncate">{em}</span>
                                                <button onClick={() => handleRemoveAdmin(em)} className="text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition bg-gray-50 dark:bg-white/5 p-1.5 rounded-lg ml-2"><IconX className="w-3 h-3"/></button>
                                             </div>
                                          ))}
                                       </div>
                                    </div>
                                 )}
                              </div>
                           </div>
                        )}
                     </div>
                  </div>
               </div>
            )}
            
            </div>
          </main>
          
          <MainFooter socialLinks={socialLinks} />
          
          {/* Modal Berhasil Top Up */}
          {showModal && (
             <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-in fade-in duration-300">
                <div className="glass-panel bg-white dark:bg-[#0a0a0a] rounded-[3rem] p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(0,0,0,0.5)] relative overflow-hidden transform scale-in-center">
                   <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-400 to-emerald-500"></div>
                   
                   <div className="w-20 h-20 bg-emerald-50 dark:bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner border border-emerald-100 dark:border-emerald-500/20">
                      <IconCheckCircle className="w-10 h-10 text-emerald-500 dark:text-emerald-400 drop-shadow-md" />
                   </div>
                   
                   <h3 className="text-2xl font-black text-gray-900 dark:text-white mb-1">Pesanan Berhasil!</h3>
                   <p className="text-gray-500 dark:text-gray-400 text-xs font-bold mb-6">Selesaikan pembayaran agar diproses otomatis.</p>
                   
                   <div className="bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/5 rounded-2xl p-5 mb-8 text-left shadow-inner">
                      <div className="flex justify-between items-center mb-3 pb-3 border-b border-gray-200 dark:border-white/5">
                         <span className="text-[10px] text-gray-500 uppercase font-black tracking-widest">ID Transaksi</span>
                         <span className="font-mono text-xs font-bold text-gray-700 dark:text-gray-300">{lastOrderId}</span>
                      </div>
                      <div className="flex justify-between items-center mb-3">
                         <span className="text-[10px] text-gray-500 uppercase font-black tracking-widest">Total Tagihan</span>
                         <span className="font-black text-xl text-emerald-500 dark:text-emerald-400 drop-shadow-sm">{formatRupiah(activeOrderDetails?.priceTotal || 0)}</span>
                      </div>
                      
                      {selectedPayment?.id === 'qris' && dynamicQrisUrl && (
                         <div className="mt-5 flex flex-col items-center animate-in slide-in-from-bottom-2 bg-white p-3 rounded-2xl border border-gray-200">
                            <img src={dynamicQrisUrl} alt="QRIS" className="w-48 h-48 object-contain mix-blend-multiply" />
                            <p className="text-[10px] font-black text-black uppercase tracking-widest mt-2">Scan & Bayar</p>
                         </div>
                      )}
                      
                      {selectedPayment?.id === 'cash' && (
                         <div className="mt-4 text-center bg-orange-50 dark:bg-orange-500/10 p-4 rounded-xl border border-orange-200 dark:border-orange-500/20 flex flex-col items-center">
                            <img src={`https://barcode.orcascan.com/?type=code128&data=VPC-${(lastOrderId||'').substring(0,6).toUpperCase()}-${activeOrderDetails?.priceTotal || 0}`} className="w-48 h-20 object-cover mix-blend-multiply dark:mix-blend-screen dark:bg-white rounded-xl mb-3" />
                            <p className="text-[10px] font-bold text-orange-600 dark:text-orange-400 leading-relaxed uppercase tracking-wide">Tunjukkan Barcode ini ke kasir untuk proses pembayaran Tunai.</p>
                         </div>
                      )}
                   </div>

                   <button onClick={() => {setShowModal(false); navigateTo('history');}} className="w-full bg-gray-900 dark:bg-white text-white dark:text-black hover:bg-gray-800 dark:hover:bg-gray-200 py-4.5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-xl hover:-translate-y-1">
                      Periksa Status
                   </button>
                </div>
             </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
