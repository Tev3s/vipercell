      let qris = baseQRIS.slice(0, -8);

        qris += `54${amtLen}${amtStr}`;

      qris += "6304";
      let crc = 0xFFFF;
      for (let i = 0; i < qris.length; i++) {
        crc ^= qris.charCodeAt(i) << 8;
        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
          else crc = (crc << 1) & 0xFFFF;
        }
      }
      return qris + crc.toString(16).toUpperCase().padStart(4, '0');

    const compressImage = async (file, maxWidth = 300) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > height) {
              if (width > maxWidth) {
                height *= maxWidth / width;
                width = maxWidth;
              }
            } else {
              if (height > maxWidth) {
                width *= maxWidth / height;
                height = maxWidth;
              }
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
        };
        reader.onerror = error => reject(error);
      });
    };

          const t = setInterval(() => setCurr(c => (c+1)%items.length), 5000);

       }, [items.length, isPaused]);

         if (promo.usedBy && promo.usedBy.includes(authUser.email)) return alert('Anda sudah pernah menggunakan kode promo ini.');
         
         // Check max uses
         if (promo.usedBy && promo.usedBy.length >= promo.maxUses) return alert('Kuota kode promo sudah habis digunakan orang lain.');
         
         // For flexible promos, check if applicable for current game
         if (flexiblePromo && flexiblePromo.applicableGames && flexiblePromo.applicableGames.length > 0) {
           if (!flexiblePromo.applicableGames.includes(selectedGame?.id)) {
             return alert('Promo ini tidak berlaku untuk game yang dipilih.');
           }
         }
         
         // Check minimum purchase
         if (flexiblePromo && flexiblePromo.minPurchase && selectedNominal) {
           if (selectedNominal.price < flexiblePromo.minPurchase) {
             return alert(`Minimal pembelian ${formatRupiah(flexiblePromo.minPurchase)} untuk menggunakan promo ini.`);
           }
         }
         
         setActivePromo(promo);
      };

      const calculateFinalPrice = (basePrice, promo) => {
        if (!promo) return basePrice;
        
        if (promo.type === PROMO_TYPES.PERCENTAGE) {
          return basePrice - (basePrice * promo.discount / 100);
        } else if (promo.type === PROMO_TYPES.FIXED) {
          return Math.max(0, basePrice - promo.discount);
        } else if (promo.type === PROMO_TYPES.BUY_ONE_GET_ONE) {
          // BOGO logic - simplified for now
          return basePrice; // Will need actual implementation
        } else if (promo.type === PROMO_TYPES.FREE_SHIPPING) {
          return basePrice; // No shipping fee anyway
        } else if (promo.type === PROMO_TYPES.SPECIAL_PRODUCT) {
          return basePrice * 0.9; // 10% off for special products
        }
        
        return basePrice;
      };

                                    </div>
                                 </div>
                                 <div className="flex gap-3 overflow-x-auto py-2 custom-scrollbar">
                                    {banners.map((b, i) => (
                                       <div key={i} className="relative w-32 h-20 flex-shrink-0 rounded-2xl overflow-hidden border border-gray-200 dark:border-white/10 group shadow-md bg-black">
                                          <img src={b.type === 'youtube' ? `https://img.youtube.com/vi/${getYouTubeId(b.url)}/hqdefault.jpg` : b.url} className="w-full h-full object-cover opacity-80" />
                                          <button onClick={() => handleDeleteBanner(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-6 h-6 text-white"/></button>
                                       </div>
                                    ))}
                                    {banners.length === 0 && <div className="text-xs font-bold text-gray-500 py-6 w-full text-center border border-dashed border-gray-200 dark:border-white/10 rounded-xl bg-gray-50 dark:bg-black/20">Belum ada banner.</div>}
                                 </div>
                              </div>

                              <div className="bg-white dark:bg-navy-900/50 backdrop-blur-md border border-gray-200 dark:border-white/10 p-6 rounded-[2rem] shadow-lg">
                                 <div className="flex justify-between items-center mb-6 border-b border-gray-200 dark:border-white/10 pb-4">
                                    <h3 className="text-lg font-black text-gray-900 dark:text-white">Foto Galeri ({galleryData.length}/6)</h3>
                                    <div className="relative w-10 h-10">
                                       <input type="file" accept="image/*" onChange={handleGalleryUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                       <button className="absolute inset-0 bg-orange-500 hover:bg-orange-600 text-white rounded-xl flex items-center justify-center font-black text-2xl leading-none shadow-md shadow-orange-500/30 transition">+</button>
                                    </div>
                                 </div>
                                 <div className="grid grid-cols-3 gap-4">
                                    {galleryData.map((img, i) => (
                                       <div key={i} className="relative aspect-square rounded-2xl overflow-hidden border border-gray-200 dark:border-white/10 group shadow-md">
                                          <img src={img} className="w-full h-full object-cover" />
                                          <button onClick={()=>handleRemoveGallery(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-6 h-6 text-white"/></button>
                                       </div>
                                    ))}
                                    {galleryData.length === 0 && <div className="col-span-3 text-center py-10 text-xs font-bold text-gray-500 border border-dashed border-gray-200 dark:border-white/10 rounded-2xl bg-gray-50 dark:bg-black/20">Belum ada foto galeri</div>}
                                 </div>
                              </div>
                           </div>
                        </div>
                     )}
                  </div>
               </div>
            )}

            {currentView === 'profile' && (
               <div className="animate-in fade-in pb-10 max-w-2xl mx-auto mt-4">
                  <div className="bg-white dark:bg-navy-900/50 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-[2.5rem] p-6 md:p-10 shadow-2xl relative overflow-hidden">
                     <div className="absolute top-0 right-0 w-64 h-64 bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>
                     
                     <div className="flex items-center gap-4 mb-8 border-b border-gray-200 dark:border-white/10 pb-6 relative z-10">
                        <div className="relative avatar-upload w-20 h-20">
                           <div className="w-20 h-20 bg-gradient-to-tr from-orange-500 to-orange-400 rounded-full flex items-center justify-center shadow-lg text-white font-black text-3xl border-4 border-white dark:border-navy-800 overflow-hidden cursor-pointer group">
                              {profileAvatar ? (
                                <img src={profileAvatar} className="w-full h-full object-cover" />
                              ) : (
                                (myData?.name ? myData.name.charAt(0).toUpperCase() : authUser.email.charAt(0).toUpperCase())
                              )}
                              <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                <IconCamera className="w-6 h-6 text-white" />
                              </div>
                           </div>
                           <input type="file" accept="image/*" onChange={handleAvatarUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                        </div>
                        <div>
                           <h2 className="text-2xl font-black text-gray-900 dark:text-white leading-tight">Profil & Keamanan</h2>
                           <p className="text-xs text-gray-500 dark:text-gray-400 font-medium">Kelola data pribadi dan keamanan akun Anda</p>
                           {isAdmin && (
                             <span className="mt-2 inline-block bg-red-500 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest">Admin</span>
                           )}
                        </div>
                     </div>

                     {uploadingAvatar && (
                       <div className="mb-4 p-3 bg-orange-50 dark:bg-orange-500/10 border border-orange-200 dark:border-orange-500/20 rounded-xl text-sm text-orange-600 dark:text-orange-400 font-bold flex items-center gap-2">
                         <IconLoader className="w-4 h-4 animate-spin" /> Mengupload foto profil...
                       </div>
                     )}

                     {avatarMessage && (
                       <div className={`mb-4 p-3 rounded-xl text-sm font-bold flex items-center gap-2 ${
                         avatarMessage.type === 'error' ? 'bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-500/20' : 
                         'bg-green-50 dark:bg-green-500/10 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-500/20'}`}>
                         {avatarMessage.type === 'error' ? <IconX className="w-4 h-4" /> : <IconCheck className="w-4 h-4" />}
                         {avatarMessage.text}
                       </div>
                     )}

                     <form onSubmit={handleUpdateProfile} className="space-y-6 relative z-10">
                        <div>
                           <label className="block text-[10px] font-black text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-widest ml-1">Nama Lengkap</label>
                           <div className="relative">
                              <IconUser className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                              <input type="text" required value={profileName} onChange={(e)=>setProfileName(e.target.value)} className="w-full bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl py-4 pl-12 pr-4 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 font-medium transition" placeholder="Masukkan nama Anda..." />
                           </div>
                        </div>
                        <div>
                           <label className="block text-[10px] font-black text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-widest ml-1">Email (Akun)</label>
                           <div className="relative">
                              <IconMail className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                              <input type="email" value={authUser.email} disabled className="w-full bg-gray-200 dark:bg-black/60 border border-gray-200 dark:border-white/5 rounded-2xl py-4 pl-12 pr-4 text-gray-500 dark:text-gray-500 font-medium cursor-not-allowed" />
                           </div>
                        </div>
                        <div>
                           <label className="block text-[10px] font-black text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-widest ml-1">Nomor WhatsApp</label>
                           <div className="relative">
                              <IconPhone className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                              <input type="tel" value={profilePhone} onChange={(e)=>setProfilePhone(e.target.value)} className="w-full bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl py-4 pl-12 pr-4 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 font-medium transition" placeholder="08xxxxxxxxxx" />
                           </div>
                        </div>

                        {!myData?.referredBy && (
                           <div className="bg-orange-50 dark:bg-orange-500/10 border border-orange-200 dark:border-orange-500/20 p-5 rounded-2xl">
                              <label className="block text-[10px] font-black text-orange-600 dark:text-orange-400 mb-2 uppercase tracking-widest ml-1 flex items-center gap-1.5"><IconGift className="w-4 h-4"/> Punya Kode Undangan?</label>
                              <input type="text" value={profileRefCode} onChange={(e)=>setProfileRefCode(e.target.value)} className="w-full bg-white dark:bg-black/40 border border-orange-200 dark:border-orange-500/30 rounded-xl py-3 px-4 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 font-mono uppercase transition shadow-inner" placeholder="MASUKKAN KODE TEMAN..." />
                              <p className="text-[10px] text-orange-500 mt-2 font-bold leading-relaxed">*Kosongkan jika tidak ada. Kolom ini akan hilang selamanya jika kode sudah diisi dan disimpan.</p>
                           </div>
                        )}

                        <div className="pt-4 border-t border-gray-200 dark:border-white/10">
                           <button type="submit" className="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white py-4.5 rounded-2xl font-black transition shadow-lg shadow-orange-500/30 uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                              <IconCheckCircle className="w-5 h-5"/> Simpan Perubahan
                           </button>
                        </div>
                     </form>

                     {/* Change Password Section */}
                     <div className="mt-10 pt-6 border-t-2 border-dashed border-gray-200 dark:border-white/10">
                       <h3 className="text-lg font-black text-gray-900 dark:text-white mb-6 flex items-center gap-3">
                         <IconKey className="w-5 h-5 text-orange-500" /> Ubah Kata Sandi
                       </h3>

                       <form onSubmit={handleChangePassword} className="space-y-5">
                         <div>
                           <label className="block text-[10px] font-black text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-widest ml-1">Kata Sandi Saat Ini</label>
                           <div className="relative">
                             <IconLock className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                             <input type="password" value={currentPassword} onChange={(e)=>setCurrentPassword(e.target.value)} className="w-full bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl py-4 pl-12 pr-4 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 font-medium transition" placeholder="********" />
                           </div>
                         </div>
                         <div>
                           <label className="block text-[10px] font-black text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-widest ml-1">Kata Sandi Baru</label>
                           <div className="relative">
                             <IconKey className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                             <input type="password" value={newPassword} onChange={(e)=>setNewPassword(e.target.value)} className="w-full bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl py-4 pl-12 pr-4 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 font-medium transition" placeholder="Minimal 6 karakter" />
                           </div>
                         </div>
                         <div>
                           <label className="block text-[10px] font-black text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-widest ml-1">Konfirmasi Kata Sandi Baru</label>
                           <div className="relative">
                             <IconCheck className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                             <input type="password" value={confirmNewPassword} onChange={(e)=>setConfirmNewPassword(e.target.value)} className="w-full bg-gray-50 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-2xl py-4 pl-12 pr-4 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 font-medium transition" placeholder="Ketik ulang kata sandi baru" />
                           </div>
                         </div>

                         {passwordMessage && (
                           <div className={`p-3 rounded-xl text-sm font-bold flex items-center gap-2 ${
                             passwordMessage.type === 'error' ? 'bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-500/20' : 
                             'bg-green-50 dark:bg-green-500/10 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-500/20'}`}>
                             {passwordMessage.type === 'error' ? <IconX className="w-4 h-4" /> : <IconCheck className="w-4 h-4" />}
                             {passwordMessage.text}
                           </div>
                         )}

                         <button type="submit" className="w-full bg-gray-900 dark:bg-white/10 hover:bg-gray-800 dark:hover:bg-white/20 text-white py-4 rounded-2xl font-black transition shadow-lg uppercase tracking-widest text-sm border border-gray-200 dark:border-white/5">
                           Perbarui Kata Sandi
                         </button>
                       </form>
                     </div>

                     {/* Referral Balance Display */}
                     <div className="mt-6 p-5 bg-gradient-to-r from-purple-50 to-orange-50 dark:from-purple-900/20 dark:to-orange-900/20 rounded-2xl border border-purple-200 dark:border-purple-500/20">
                       <div className="flex items-center justify-between">
                         <div className="flex items-center gap-3">
                           <IconWallet className="w-8 h-8 text-purple-500" />
                           <div>
                             <p className="text-xs font-bold uppercase tracking-widest text-gray-500 dark:text-gray-400">Saldo Referral</p>
                             <p className="text-2xl font-black text-purple-600 dark:text-purple-400">Rp{referralBalance}</p>
                           </div>
                         </div>
                         <div className="text-right">
                           <p className="text-xs text-gray-500 dark:text-gray-400">Total Komisi</p>
                           <p className="text-sm font-bold text-gray-700 dark:text-gray-300">{referralHistory.length} Transaksi</p>
                         </div>
                       </div>
                     </div>
                  </div>
               </div>
            )}
          </main>

          {/* FOOTER SECTION - HIDE WHEN USER CHAT IS OPEN OR ADMIN VIEW */}
          {currentView !== 'chat' && !isAdmin && (
             <footer className="mt-auto bg-white/80 dark:bg-navy-900/40 backdrop-blur-lg border-t border-gray-200 dark:border-white/10 py-12 z-10 relative overflow-hidden">
                <div className="absolute bottom-0 right-0 w-96 h-96 bg-orange-500/5 rounded-tl-full blur-3xl pointer-events-none"></div>
                <div className="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12 relative z-10">
                   <div>
                      <div className="flex items-center gap-3 mb-6">
                         <IconZap className="text-orange-500 w-8 h-8 drop-shadow-md" />
                         <span className="text-2xl font-black tracking-wider text-gray-900 dark:text-white">VIPER<span className="text-orange-500">CELL</span></span>
                      </div>
                      <p className="text-sm text-gray-600 dark:text-gray-400 mb-6 leading-relaxed font-medium">
                         Vipercell adalah penyedia layanan hiburan digital terdepan di Indonesia. Kami berdedikasi memberikan pengalaman transaksi instan, aman, dan 100% legal untuk seluruh pelanggan.
                      </p>
                      <p className="text-xs text-gray-700 dark:text-gray-300 font-bold flex items-center gap-2 mb-6 bg-gray-100 dark:bg-black/30 w-fit px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/5 shadow-inner">
                         📍 Passo, Kota Ambon, Maluku
                      </p>
                      <div className="flex gap-3">
                         {socialLinks.ig && <a href={socialLinks.ig} target="_blank" className="p-3 bg-white dark:bg-white/5 text-pink-500 hover:bg-pink-500 hover:text-white border border-gray-200 dark:border-white/10 rounded-xl shadow-sm transition hover:-translate-y-1"><IconInstagram className="w-5 h-5"/></a>}
                         {socialLinks.wa && <a href={socialLinks.wa} target="_blank" className="p-3 bg-white dark:bg-white/5 text-green-500 hover:bg-green-500 hover:text-white border border-gray-200 dark:border-white/10 rounded-xl shadow-sm transition hover:-translate-y-1"><IconWhatsapp className="w-5 h-5"/></a>}
                         {socialLinks.tt && <a href={socialLinks.tt} target="_blank" className="p-3 bg-white dark:bg-white/5 text-gray-900 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-100 hover:text-black border border-gray-200 dark:border-white/10 rounded-xl shadow-sm transition hover:-translate-y-1"><IconTiktok className="w-5 h-5"/></a>}
                         {socialLinks.tg && <a href={socialLinks.tg} target="_blank" className="p-3 bg-white dark:bg-white/5 text-blue-500 hover:bg-blue-500 hover:text-white border border-gray-200 dark:border-white/10 rounded-xl shadow-sm transition hover:-translate-y-1"><IconTelegram className="w-5 h-5"/></a>}
                      </div>
                   </div>

                   <div className="md:col-span-2">
                      <h3 className="font-black text-gray-900 dark:text-white mb-6 uppercase tracking-widest text-sm flex items-center gap-3"><IconImage className="w-5 h-5 text-orange-500"/> Galeri & Testimoni</h3>
                      {galleryData.length > 0 ? (
                         <div className="flex gap-4 overflow-x-auto pb-6 custom-scrollbar snap-x">
                            {galleryData.map((img, i) => (
                               <img key={i} src={img} className="w-40 h-40 md:w-48 md:h-48 object-cover rounded-3xl shadow-lg snap-center border border-gray-200 dark:border-white/10 flex-shrink-0 hover:scale-105 transition duration-300 cursor-pointer" />
                            ))}
                         </div>
                      ) : (
                         <div className="bg-gray-50 dark:bg-black/20 border border-dashed border-gray-200 dark:border-white/10 rounded-3xl p-10 text-center text-sm text-gray-500 font-bold">Belum ada foto galeri yang diunggah.</div>
                      )}
                   </div>
                </div>
             </footer>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
