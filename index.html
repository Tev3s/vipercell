    const generateDynamicQRIS = (baseQRIS, amount) => {
      let qris = baseQRIS.slice(0, -8);
      if (amount) {
        let amtStr = amount.toString(); let amtLen = amtStr.length.toString().padStart(2, '0');
        qris += `54${amtLen}${amtStr}`;
      }
      qris += "6304";
      let crc = 0xFFFF;
      for (let i = 0; i < qris.length; i++) {
        crc ^= qris.charCodeAt(i) << 8;
        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
          else crc = (crc << 1) & 0xFFFF;
        }
      }
      return qris + crc.toString(16).toUpperCase().padStart(4, '0');
    };

    const compressImage = async (file, maxWidth = 300) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image(); img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } } 
            else { if (h > maxWidth) { w *= maxWidth / h; h = maxWidth; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
        }; reader.onerror = reject;
      });
    };

                                       ))}
                                    </div>
                                    <button onClick={saveRunningTexts} className="mt-5 w-full bg-orange-600 hover:bg-orange-500 text-white px-8 py-3.5 rounded-xl font-black text-xs uppercase tracking-widest transition shadow-lg shadow-orange-500/20">Simpan Teks</button>
                                 </div>

                                 {/* SLIDER BANNER */}
                                 <div className="bg-black/60 p-6 md:p-8 rounded-[2.5rem] border border-white/5 shadow-inner flex flex-col">
                                    <h3 className="text-lg font-black text-white mb-6">Slider Banner (Home)</h3>
                                    <div className="flex gap-2 mb-4">
                                       <input type="text" value={adminBannerUrl} onChange={(e)=>setAdminBannerUrl(e.target.value)} className="flex-1 bg-black border border-white/10 rounded-xl py-3 px-4 text-sm focus:border-blue-500 transition shadow-sm text-white" placeholder="Tempel URL Banner/Youtube" />
                                       <button onClick={() => handleAddBanner(getYouTubeId(adminBannerUrl)?'youtube':'image', adminBannerUrl)} className="bg-white text-black px-5 rounded-xl font-black transition text-xl shadow-md hover:bg-gray-200">+</button>
                                    </div>
                                    <div className="relative group mb-6">
                                       <input type="file" accept="image/*" onChange={handleBannerUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                       <div className="bg-white/5 border border-dashed border-white/20 group-hover:border-blue-500 rounded-xl p-4 flex items-center justify-center gap-2 text-gray-400 text-xs font-bold transition shadow-sm">
                                          <IconUpload className="w-4 h-4"/> Upload Banner (Max 2MB)
                                       </div>
                                    </div>
                                    <div className="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
                                       {banners?.map((b, i) => (
                                          <div key={i} className="relative w-32 h-20 flex-shrink-0 rounded-xl overflow-hidden border border-white/10 group bg-black shadow-sm">
                                             <img src={b?.type === 'youtube' ? `https://img.youtube.com/vi/${getYouTubeId(b?.url)}/hqdefault.jpg` : b?.url} className="w-full h-full object-cover opacity-80 group-hover:scale-110 transition duration-500" />
                                             <button onClick={() => handleDeleteBanner(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-5 h-5 text-white"/></button>
                                          </div>
                                       ))}
                                    </div>
                                 </div>
                              </div>

                              {/* GALERI & AKSES ADMIN */}
                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                 {/* GALERI */}
                                 <div className="bg-black/60 p-6 md:p-8 rounded-[2.5rem] border border-white/5 shadow-inner flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                       <h3 className="text-sm font-black text-white">Galeri Toko <span className="text-[9px] bg-white/10 px-2 py-0.5 rounded-md font-mono align-middle ml-1">{galleryData?.length || 0}/16</span></h3>
                                       <div className="relative group w-8 h-8">
                                          <input type="file" accept="image/*" onChange={handleGalleryUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                          <button className="absolute inset-0 bg-white/10 hover:bg-white/20 border border-white/10 rounded-lg flex items-center justify-center font-black transition text-sm">+</button>
                                       </div>
                                    </div>
                                    <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-4 gap-2">
                                       {galleryData?.map((img, i) => (
                                          <div key={i} className="relative aspect-square rounded-lg overflow-hidden border border-white/10 group bg-black shadow-sm">
                                             <img src={img} className="w-full h-full object-cover opacity-80 group-hover:scale-110 transition duration-500" />
                                             <button onClick={()=>handleRemoveGallery(i)} className="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm"><IconTrash className="w-3 h-3 text-white"/></button>
                                          </div>
                                       ))}
                                       {(!galleryData || galleryData.length === 0) && <p className="col-span-full text-xs text-gray-500 font-bold">Galeri kosong.</p>}
                                    </div>
                                 </div>

                                 {/* AKSES SUPER ADMIN */}
                                 {isSuperAdmin && (
                                    <div className="bg-red-900/10 p-6 rounded-[2.5rem] border border-red-500/20 shadow-inner relative overflow-hidden flex flex-col">
                                       <div className="absolute -top-10 -right-10 w-32 h-32 bg-red-500/10 rounded-full blur-2xl pointer-events-none"></div>
                                       <h3 className="text-sm font-black text-red-400 mb-4 flex items-center gap-2 relative z-10"><IconShieldAlert className="w-4 h-4"/> Akses Karyawan</h3>
                                       <form onSubmit={handleAddAdmin} className="flex gap-2 mb-4 relative z-10">
                                          <input type="email" required value={newAdminEmail} onChange={(e)=>setNewAdminEmail(e.target.value)} placeholder="Email admin..." className="flex-1 bg-black border border-white/10 rounded-xl py-2.5 px-3 text-xs focus:border-red-500 transition text-white shadow-sm" />
                                          <button type="submit" className="bg-red-600 hover:bg-red-500 text-white px-4 rounded-xl font-black transition text-xs shadow-lg">Add</button>
                                       </form>
                                       <div className="space-y-2 relative z-10 overflow-y-auto custom-scrollbar flex-1">
                                          <div className="flex justify-between items-center bg-red-500/20 border border-red-500/30 p-3 rounded-xl shadow-inner">
                                             <span className="text-xs font-black text-red-300 truncate">{ADMIN_EMAIL}</span>
                                             <span className="text-[8px] bg-red-600 text-white px-2 py-0.5 rounded font-black uppercase tracking-widest ml-2">Owner</span>
                                          </div>
                                          {adminList?.map(em => (
                                             <div key={em} className="flex justify-between items-center bg-black/40 border border-white/5 p-3 rounded-xl transition shadow-sm">
                                                <span className="text-xs text-gray-300 font-bold truncate">{em}</span>
                                                <button onClick={() => handleRemoveAdmin(em)} className="text-gray-500 hover:text-red-400 transition bg-white/5 p-1.5 rounded-lg ml-2"><IconX className="w-3 h-3"/></button>
                                             </div>
                                          ))}
                                       </div>
                                    </div>
                                 )}
                              </div>
                           </div>
                        )}
                     </div>
                  </div>
               </div>
            )}
            </div>
          </main>
          
          <MainFooter socialLinks={socialLinks} />
        </div>
      );
    }
    
    // Inject Toaster Provider at root level
    const App = () => (
        <ToastProvider>
            <AppCore />
        </ToastProvider>
    );

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
