            const id = Date.now() + Math.random();
            setToasts(prev => { if(prev.some(t => t.msg === msg)) return prev; return [...prev, { id, msg, type }]; });
            setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, 4000);
        }, []);

        return (
            <ToastContext.Provider value={{ addToast }}>
                {children}

                                         ))}
                                         {(!promos || promos.length === 0) && (
                                            <div className="flex flex-col items-center justify-center py-24 text-sub-theme border border-dashed border-theme rounded-[2rem] bg-card">
                                               <IconPercent className="w-12 h-12 mb-4 opacity-30"/>
                                               <span className="font-bold text-sm">Database promo kosong. Terbitkan promo pertama Anda.</span>
                                            </div>
                                         )}
                                      </div>
                                   </div>
                               </div>
                           </div>
                        )}

                     </div>
                  </div>
               </div>
            )}

            </div>
          </main>
          
          {currentView !== 'chat' && <MainFooter socialLinks={socialLinks} appName={globalConfig?.appName || 'VIPERCELL'} />}
        </div>
      );
    }
    
    const App = () => {
        return (
           <ToastProvider>
               <AppCore />
           </ToastProvider>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
